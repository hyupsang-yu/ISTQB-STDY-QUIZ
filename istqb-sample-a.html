<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISTQB CTFL 4.0 샘플 문제 A</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222638;
    --border: #2e334d;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e8eaf2;
    --muted: #8892b0;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(135deg, #1a1d27 0%, #13162a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    letter-spacing: 1px;
  }
  .logo-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .logo-sub { font-size: 12px; color: var(--muted); }

  .header-stats { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-total { background: var(--accent); }
  .dot-correct { background: var(--green); }
  .dot-wrong { background: var(--red); }
  .dot-skip { background: var(--muted); }

  /* ─── LAYOUT ─── */
  .container { max-width: 900px; margin: 0 auto; padding: 28px 20px; }

  /* ─── TABS ─── */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--surface);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    padding: 9px 16px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .tab-btn:hover:not(.active) { color: var(--text); background: var(--surface2); }

  /* ─── PROGRESS STRIP ─── */
  .progress-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 20px;
    padding: 14px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .q-dot {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    transition: all .15s;
    font-family: 'JetBrains Mono', monospace;
  }
  .q-dot:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.1); }
  .q-dot.current { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.15); }
  .q-dot.correct { background: rgba(34,197,94,0.2); border-color: var(--green); color: var(--green); }
  .q-dot.wrong { background: rgba(239,68,68,0.2); border-color: var(--red); color: var(--red); }

  /* ─── QUESTION CARD ─── */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    box-shadow: var(--card-shadow);
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .q-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 1px;
  }
  .q-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .badge-k1 { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .badge-k2 { background: rgba(79,142,247,0.15); color: #93c5fd; border: 1px solid rgba(79,142,247,0.3); }
  .badge-k3 { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
  .badge-lo { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 10px; margin-left: 4px; }

  .q-text {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 22px;
    font-weight: 400;
  }
  .q-text strong { color: var(--accent); font-weight: 700; }

  .q-table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0 20px;
    font-size: 13px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .q-table th { background: var(--surface2); padding: 8px 12px; text-align: center; color: var(--muted); font-weight: 600; font-size: 12px; border: 1px solid var(--border); }
  .q-table td { padding: 7px 12px; text-align: center; border: 1px solid var(--border); font-size: 13px; }
  .q-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* ─── OPTIONS ─── */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    transition: all .15s;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(79,142,247,0.08); }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.selected-correct { border-color: var(--green); background: rgba(34,197,94,0.1); }
  .opt-btn.selected-wrong { border-color: var(--red); background: rgba(239,68,68,0.1); }
  .opt-btn.show-correct { border-color: var(--green); background: rgba(34,197,94,0.08); }

  .opt-label {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    margin-top: 1px;
  }
  .selected-correct .opt-label { background: rgba(34,197,94,0.2); border-color: var(--green); color: var(--green); }
  .selected-wrong .opt-label { background: rgba(239,68,68,0.2); border-color: var(--red); color: var(--red); }
  .show-correct .opt-label { background: rgba(34,197,94,0.2); border-color: var(--green); color: var(--green); }

  /* ─── EXPLANATION ─── */
  .explanation {
    margin-top: 18px;
    padding: 16px 18px;
    background: rgba(79,142,247,0.06);
    border: 1px solid rgba(79,142,247,0.25);
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.8;
    color: #cdd5f0;
    display: none;
  }
  .explanation.show { display: block; animation: fadeIn .2s ease; }
  .explanation-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .exp-row { margin: 4px 0; }
  .exp-correct-mark { color: var(--green); font-weight: 700; margin-right: 4px; }
  .exp-wrong-mark { color: var(--red); margin-right: 4px; }

  /* ─── NAVIGATION ─── */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .nav-btn {
    padding: 10px 20px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .nav-btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: white;
  }
  .nav-btn.primary:hover { opacity: 0.9; color: white; border-color: transparent; }

  .q-counter { font-size: 13px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

  /* ─── LIST VIEW ─── */
  .list-view { display: none; }
  .list-view.active { display: block; }
  .quiz-view { display: block; }
  .quiz-view.hidden { display: none; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .list-item:hover { border-color: var(--accent); transform: translateX(4px); }
  .list-item.correct { border-left: 3px solid var(--green); }
  .list-item.wrong { border-left: 3px solid var(--red); }
  .list-num {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    background: var(--surface2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
  }
  .list-q-text { font-size: 13px; color: var(--text); line-height: 1.6; flex: 1; }
  .list-answer { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ─── RESULT SCREEN ─── */
  .result-screen { display: none; }
  .result-screen.show { display: block; }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    text-align: center;
    box-shadow: var(--card-shadow);
    margin-bottom: 24px;
  }
  .result-score {
    font-size: 72px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  .result-label { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .result-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 24px 0;
  }
  .result-stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .result-stat-num { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .result-stat-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .num-correct { color: var(--green); }
  .num-wrong { color: var(--red); }
  .num-skip { color: var(--muted); }

  /* ─── FILTER BAR ─── */
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-btn {
    padding: 6px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: var(--surface2);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .filter-btn.active-filter { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.1); }
  .filter-btn:hover:not(.active-filter) { color: var(--text); }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .question-card { padding: 18px; }
    .result-grid { grid-template-columns: repeat(3, 1fr); }
    .result-score { font-size: 52px; }
    .result-card { padding: 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <span class="logo-badge">ISTQB</span>
    <div>
      <div class="logo-title">CTFL 4.0 샘플 문제 A</div>
      <div class="logo-sub">Foundation Level · 66문항</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-chip"><span class="stat-dot dot-total"></span><span id="stat-total">0 / 66</span></div>
    <div class="stat-chip"><span class="stat-dot dot-correct"></span><span id="stat-correct" style="color:var(--green)">0 정답</span></div>
    <div class="stat-chip"><span class="stat-dot dot-wrong"></span><span id="stat-wrong" style="color:var(--red)">0 오답</span></div>
  </div>
</header>

<div class="container">
  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('quiz')">📝 문제 풀기</button>
    <button class="tab-btn" onclick="switchTab('list')">📋 문제 목록</button>
    <button class="tab-btn" onclick="switchTab('result')">📊 결과</button>
  </div>

  <!-- QUIZ VIEW -->
  <div class="quiz-view" id="quizView">
    <!-- Progress dots -->
    <div class="progress-strip" id="progressStrip"></div>

    <!-- Question card -->
    <div class="question-card" id="qCard">
      <div class="q-meta">
        <span class="q-number" id="qNumber">Q 01</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <span class="q-badge" id="qKbadge"></span>
          <span class="q-badge badge-lo" id="qLO"></span>
        </div>
      </div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="qOptions"></div>
      <div class="explanation" id="qExplanation">
        <div class="explanation-title">💡 해설</div>
        <div id="expContent"></div>
      </div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← 이전</button>
      <span class="q-counter" id="qCounter">1 / 66</span>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">다음 →</button>
    </div>
  </div>

  <!-- LIST VIEW -->
  <div class="list-view" id="listView">
    <div class="filter-bar">
      <button class="filter-btn active-filter" onclick="setFilter('all', this)">전체 (66)</button>
      <button class="filter-btn" onclick="setFilter('unanswered', this)" id="f-unanswered">미응답</button>
      <button class="filter-btn" onclick="setFilter('correct', this)" id="f-correct">정답</button>
      <button class="filter-btn" onclick="setFilter('wrong', this)" id="f-wrong">오답</button>
    </div>
    <div id="listContainer"></div>
  </div>

  <!-- RESULT VIEW -->
  <div class="result-screen" id="resultView">
    <div class="result-card">
      <div class="result-score" id="resultPct">0%</div>
      <div class="result-label">정답률</div>
      <div class="result-grid">
        <div class="result-stat"><div class="result-stat-num num-correct" id="r-correct">0</div><div class="result-stat-lbl">정답</div></div>
        <div class="result-stat"><div class="result-stat-num num-wrong" id="r-wrong">0</div><div class="result-stat-lbl">오답</div></div>
        <div class="result-stat"><div class="result-stat-num num-skip" id="r-skip">0</div><div class="result-stat-lbl">미응답</div></div>
      </div>
      <button class="nav-btn primary" style="margin:0 auto" onclick="resetAll()">🔄 다시 시작</button>
    </div>

    <div id="wrongListContainer"></div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
// QUESTION DATA (문제 1~40 + 추가 A1~A26)
// ──────────────────────────────────────────────
const QUESTIONS = [
  {
    id:1, lo:"FL-1.1.1", k:"K1",
    text:"다음 설명 중 유효한 <strong>테스트 목적</strong>인 것은?",
    opts:["테스트 중인 시스템에 수정되지 않은 결함이 없음을 증명하기 위해","운영 환경에 구현한 시스템에 오류가 없음을 증명하기 위해","테스트 대상의 리스크 수준을 낮추고, 품질 수준에 대한 자신감을 얻기 위해","테스트하지 않은 입력 조합이 없는지 확인하기 위해"],
    ans:2,
    exp:["❌ 결함이 없음을 증명하는 것은 불가능합니다. (원리 1)","❌ 오류가 없음을 증명하는 것은 불가능합니다. (원리 7)","✅ 테스팅은 결함·장애를 찾아 리스크를 줄이고 품질 신뢰도를 높입니다.","❌ 모든 입력 조합을 테스트하는 것은 불가능합니다. (원리 2)"]
  },
  {
    id:2, lo:"FL-1.2.1", k:"K2",
    text:"다음 중 테스트 활동이 <strong>성공에 기여하는 예</strong>를 나타내는 옵션은?",
    opts:["소프트웨어 개발 수명주기의 다양한 활동에 테스터가 참여함으로써 작업 산출물의 결함 식별을 지원한다","개발자가 코드를 개발하는 동안 테스터가 방해하지 않도록 애씀으로써 개발자가 더 좋은 코드를 작성할 수 있게 한다","최종 사용자와 협업하는 테스터는 단위 통합 및 시스템 테스팅 중 작성하는 결함 보고서의 품질을 높인다","자격증을 보유한 테스터가 자격증이 없는 테스터보다 훨씬 좋은 테스트 케이스를 작성할 것이다"],
    ans:0,
    exp:["✅ SDLC 초기부터 테스터 참여로 결함을 조기 발견하고 설계를 이해할 수 있습니다.","❌ 개발자와 테스터 모두 서로의 작업에서 배울 수 있습니다.","❌ 최종 사용자는 결함 보고서 품질 향상을 위해 테스터를 지원하지 않으며, 통합 테스팅에 참여하지 않습니다.","❌ 자격증 보유가 테스트 케이스 품질을 보장하지는 않습니다."]
  },
  {

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let currentIdx = 0;
let answers = {}; // idx -> selected (number or array)
let currentFilter = 'all';

function isMulti(q) { return Array.isArray(q.ans); }

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
function init() {
  buildProgressStrip();
  renderQuestion(0);
  updateStats();
}

// ──────────────────────────────────────────────
// PROGRESS STRIP
// ──────────────────────────────────────────────
function buildProgressStrip() {
  const strip = document.getElementById('progressStrip');
  strip.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const d = document.createElement('div');
    d.className = 'q-dot';
    d.textContent = i < 40 ? (i+1) : q.id;
    d.id = `dot-${i}`;
    d.onclick = () => { navigate(i - currentIdx); };
    strip.appendChild(d);
  });
}

function updateDot(idx) {
  const d = document.getElementById(`dot-${idx}`);
  if (!d) return;
  d.classList.remove('current','correct','wrong');
  const q = QUESTIONS[idx];
  if (answers[idx] !== undefined) {
    const a = answers[idx];
    const correct = isMulti(q)
      ? arrEq(Array.isArray(a) ? a : [a], q.ans)
      : a === q.ans;
    d.classList.add(correct ? 'correct' : 'wrong');
  }
  if (idx === currentIdx) d.classList.add('current');
}

function arrEq(a, b) {
  const sa = [...a].sort(), sb = [...b].sort();
  return sa.length === sb.length && sa.every((v,i) => v === sb[i]);
}

// ──────────────────────────────────────────────
// RENDER QUESTION
// ──────────────────────────────────────────────
function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  document.getElementById('qNumber').textContent = `Q ${String(q.id).padStart(2,'0')}`;

  const kBadge = document.getElementById('qKbadge');
  kBadge.textContent = q.k;
  kBadge.className = 'q-badge badge-' + q.k.toLowerCase();
  document.getElementById('qLO').textContent = q.lo;

  document.getElementById('qText').innerHTML = q.text;

  const opts = document.getElementById('qOptions');
  opts.innerHTML = '';
  const labels = ['a','b','c','d','e'];
  q.opts.forEach((opt, oi) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-label">${labels[oi]}</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(idx, oi, btn);
    opts.appendChild(btn);
  });

  // if already answered, restore state
  if (answers[idx] !== undefined) {
    showAnswer(idx);
  }

  // explanation
  document.getElementById('qExplanation').classList.remove('show');

  document.getElementById('qCounter').textContent = `${idx+1} / ${QUESTIONS.length}`;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === QUESTIONS.length - 1;
}

function selectOption(idx, oi, btn) {
  const q = QUESTIONS[idx];
  if (answers[idx] !== undefined) return; // already answered

  if (isMulti(q)) {
    // multi: toggle selection
    if (!answers[idx]) answers[idx] = [];
    const arr = answers[idx];
    const pos = arr.indexOf(oi);
    if (pos === -1) arr.push(oi);
    else arr.splice(pos, 1);
    // visual
    const optBtns = document.querySelectorAll('#qOptions .opt-btn');
    optBtns.forEach((b, i) => {
      b.classList.remove('selected-correct','selected-wrong','show-correct');
      if (arr.includes(i)) b.classList.add('selected-correct');
    });
    // "Submit" button or auto-submit when count matches ans length
    if (arr.length === q.ans.length) {
      finalizeAnswer(idx);
    }
  } else {
    answers[idx] = oi;
    finalizeAnswer(idx);
  }
}

function finalizeAnswer(idx) {
  const q = QUESTIONS[idx];
  showAnswer(idx);
  updateDot(idx);
  updateStats();
}

function showAnswer(idx) {
  const q = QUESTIONS[idx];
  const optBtns = document.querySelectorAll('#qOptions .opt-btn');
  const a = answers[idx];

  optBtns.forEach(b => b.disabled = true);

  if (isMulti(q)) {
    const selected = Array.isArray(a) ? a : [];
    optBtns.forEach((b, i) => {
      b.classList.remove('selected-correct','selected-wrong','show-correct');
      if (q.ans.includes(i) && selected.includes(i)) b.classList.add('selected-correct');
      else if (selected.includes(i) && !q.ans.includes(i)) b.classList.add('selected-wrong');
      else if (q.ans.includes(i)) b.classList.add('show-correct');
    });
  } else {
    optBtns.forEach((b, i) => {
      b.classList.remove('selected-correct','selected-wrong','show-correct');
      if (i === a && i === q.ans) b.classList.add('selected-correct');
      else if (i === a && i !== q.ans) b.classList.add('selected-wrong');
      else if (i === q.ans) b.classList.add('show-correct');
    });
  }

  // explanation
  const expDiv = document.getElementById('expContent');
  expDiv.innerHTML = '';
  q.exp.forEach((e, i) => {
    const row = document.createElement('div');
    row.className = 'exp-row';
    row.textContent = e;
    expDiv.appendChild(row);
  });
  document.getElementById('qExplanation').classList.add('show');
}

// ──────────────────────────────────────────────
// NAVIGATION
// ──────────────────────────────────────────────
function navigate(delta) {
  const prev = currentIdx;
  currentIdx = Math.max(0, Math.min(QUESTIONS.length-1, currentIdx + delta));
  if (prev !== currentIdx) {
    // direct jump (delta > 1)
  }
  updateDot(prev);
  updateDot(currentIdx);
  renderQuestion(currentIdx);
  // scroll to top
  document.querySelector('.question-card').scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ──────────────────────────────────────────────
// STATS
// ──────────────────────────────────────────────
function updateStats() {
  let correct = 0, wrong = 0, total = Object.keys(answers).length;
  QUESTIONS.forEach((q, i) => {
    if (answers[i] !== undefined) {
      const a = answers[i];
      const ok = isMulti(q) ? arrEq(Array.isArray(a)?a:[a], q.ans) : a === q.ans;
      if (ok) correct++; else wrong++;
    }
  });
  document.getElementById('stat-total').textContent = `${total} / ${QUESTIONS.length}`;
  document.getElementById('stat-correct').textContent = `${correct} 정답`;
  document.getElementById('stat-wrong').textContent = `${wrong} 오답`;
  // result
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-skip').textContent = QUESTIONS.length - total;
  const pct = Math.round((correct / QUESTIONS.length) * 100);
  document.getElementById('resultPct').textContent = pct + '%';
}

// ──────────────────────────────────────────────
// TABS
// ──────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.remove('active'));
  const tabs = ['quiz','list','result'];
  document.querySelector(`.tab-btn:nth-child(${tabs.indexOf(tab)+1})`).classList.add('active');

  document.getElementById('quizView').classList.toggle('hidden', tab !== 'quiz');
  document.getElementById('listView').classList.toggle('active', tab === 'list');
  document.getElementById('resultView').classList.toggle('show', tab === 'result');

  if (tab === 'list') renderList();
  if (tab === 'result') renderWrongList();
}

// ──────────────────────────────────────────────
// LIST VIEW
// ──────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-filter'));
  btn.classList.add('active-filter');
  renderList();
}

function renderList() {
  const container = document.getElementById('listContainer');
  container.innerHTML = '';

  // update filter counts
  let correct = 0, wrong = 0, unanswered = 0;
  QUESTIONS.forEach((q,i) => {
    if (answers[i] === undefined) unanswered++;
    else {
      const a = answers[i];
      const ok = isMulti(q) ? arrEq(Array.isArray(a)?a:[a], q.ans) : a === q.ans;
      if (ok) correct++; else wrong++;
    }
  });
  document.getElementById('f-unanswered').textContent = `미응답 (${unanswered})`;
  document.getElementById('f-correct').textContent = `정답 (${correct})`;
  document.getElementById('f-wrong').textContent = `오답 (${wrong})`;

  QUESTIONS.forEach((q, i) => {
    const hasAns = answers[i] !== undefined;
    if (!hasAns) { if (currentFilter !== 'all' && currentFilter !== 'unanswered') return; }
    else {
      const a = answers[i];
      const ok = isMulti(q) ? arrEq(Array.isArray(a)?a:[a], q.ans) : a === q.ans;
      if (currentFilter === 'correct' && !ok) return;
      if (currentFilter === 'wrong' && ok) return;
      if (currentFilter === 'unanswered') return;
    }

    const item = document.createElement('div');
    let cls = 'list-item';
    if (hasAns) {
      const a = answers[i];
      const ok = isMulti(q) ? arrEq(Array.isArray(a)?a:[a], q.ans) : a === q.ans;
      cls += ok ? ' correct' : ' wrong';
    }
    item.className = cls;
    item.onclick = () => {
      switchTab('quiz');
      const delta = i - currentIdx;
      navigate(delta);
    };

    const labels = ['a','b','c','d','e'];
    const correctAns = isMulti(q) ? q.ans.map(a=>labels[a]).join(', ') : labels[q.ans];
    const statusIcon = !hasAns ? '⬜' : (()=>{
      const a = answers[i];
      const ok = isMulti(q) ? arrEq(Array.isArray(a)?a:[a], q.ans) : a === q.ans;
      return ok ? '✅' : '❌';
    })();

    item.innerHTML = `
      <div class="list-num">${q.id}</div>
      <div style="flex:1">
        <div class="list-q-text">${statusIcon} ${q.text.replace(/<[^>]+>/g,'').substring(0,80)}...</div>
        <div class="list-answer">정답: <strong>${correctAns}</strong> · ${q.lo} · ${q.k}</div>
      </div>
    `;
    container.appendChild(item);
  });
}

// ──────────────────────────────────────────────
// WRONG LIST (result tab)
// ──────────────────────────────────────────────
function renderWrongList() {
  const container = document.getElementById('wrongListContainer');
  container.innerHTML = '';
  let hasWrong = false;
  QUESTIONS.forEach((q, i) => {
    if (answers[i] === undefined) return;
    const a = answers[i];
    const ok = isMulti(q) ? arrEq(Array.isArray(a)?a:[a], q.ans) : a === q.ans;
    if (ok) return;
    hasWrong = true;
    const labels = ['a','b','c','d','e'];
    const correctAns = isMulti(q) ? q.ans.map(x=>labels[x]).join(', ') : labels[q.ans];
    const myAns = isMulti(q)
      ? (Array.isArray(a)?a:[a]).map(x=>labels[x]).join(', ')
      : labels[a];
    const div = document.createElement('div');
    div.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:12px;padding:16px 20px;margin-bottom:10px;cursor:pointer;';
    div.onclick = () => { switchTab('quiz'); navigate(i - currentIdx); };
    div.innerHTML = `
      <div style="font-size:11px;color:var(--accent);font-family:monospace;margin-bottom:6px">Q${q.id} · ${q.lo} · ${q.k}</div>
      <div style="font-size:13px;line-height:1.6;margin-bottom:8px">${q.text.replace(/<[^>]+>/g,'').substring(0,100)}...</div>
      <div style="font-size:12px;color:var(--red)">내 답: ${myAns}</div>
      <div style="font-size:12px;color:var(--green)">정답: ${correctAns}</div>
    `;
    container.appendChild(div);
  });
  if (!hasWrong) {
    container.innerHTML = '<div style="text-align:center;color:var(--green);padding:20px;font-size:14px">🎉 오답이 없습니다!</div>';
  }
}

// ──────────────────────────────────────────────
// RESET
// ──────────────────────────────────────────────
function resetAll() {
  answers = {};
  currentIdx = 0;
  buildProgressStrip();
  renderQuestion(0);
  updateStats();
  switchTab('quiz');
}

// ──────────────────────────────────────────────
// START
// ──────────────────────────────────────────────
init();
</script>
</body>
</html>
