<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISTQB 샘플문제 C 퀴즈</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #252838;
    --border: #2e3247;
    --accent: #6c8cff;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e2e8f0;
    --muted: #8892a4;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 60px;
  }

  /* ── 헤더 ── */
  .header {
    width: 100%;
    max-width: 720px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .header-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: .08em;
    font-weight: 700;
  }
  .score-badge {
    display: flex;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .score-badge span { color: var(--muted); }
  .score-badge .ok { color: var(--green); }
  .score-badge .ng { color: var(--red); }

  /* ── 메인 카드 ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 26px;
    width: 100%;
    max-width: 720px;
    margin-bottom: 14px;
  }

  /* ── 진행바 ── */
  .progress-wrap {
    width: 100%;
    max-width: 720px;
    margin-bottom: 20px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 7px;
    font-family: 'JetBrains Mono', monospace;
  }
  .progress-bar {
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  /* ── 질문 ── */
  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(108,140,255,.12);
    padding: 3px 9px;
    border-radius: 6px;
    font-weight: 700;
  }
  .q-lo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .q-text {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 22px;
    word-break: keep-all;
  }

  /* ── 선택지 ── */
  .opts { display: flex; flex-direction: column; gap: 10px; }

  .opt-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    cursor: pointer;
    transition: border-color .2s, background .2s, transform .1s;
    text-align: left;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14.5px;
    line-height: 1.55;
    word-break: keep-all;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(108,140,255,.07);
    transform: translateY(-1px);
  }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct { border-color: var(--green); background: rgba(52,211,153,.1); }
  .opt-btn.wrong   { border-color: var(--red);   background: rgba(248,113,113,.1); }

  .opt-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    min-width: 20px;
    padding-top: 1px;
    color: var(--muted);
  }
  .opt-btn.correct .opt-label { color: var(--green); }
  .opt-btn.wrong   .opt-label { color: var(--red); }

  /* ── 해설 ── */
  .explanation {
    display: none;
    margin-top: 18px;
    padding: 16px 18px;
    background: rgba(108,140,255,.06);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
    word-break: keep-all;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--text); }

  /* ── 다음 버튼 ── */
  .btn-next {
    display: none;
    margin: 0 auto;
    margin-top: 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 36px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: opacity .2s, transform .15s;
  }
  .btn-next:hover { opacity: .88; transform: translateY(-1px); }
  .btn-next.show { display: block; }

  /* ── 결과 화면 ── */
  #resultView { display: none; width: 100%; max-width: 720px; }

  .result-hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 28px;
    text-align: center;
    margin-bottom: 20px;
  }
  .result-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 56px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-label {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    font-family: 'JetBrains Mono', monospace;
  }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .stat-val { font-size: 26px; font-weight: 700; }
  .stat-key { font-size: 11px; color: var(--muted); }
  .stat-val.ok { color: var(--green); }
  .stat-val.ng { color: var(--red); }

  .result-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color .2s, background .2s;
  }
  .btn-outline:hover { border-color: var(--accent); background: rgba(108,140,255,.07); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .88; }

  /* ── 오답 목록 ── */
  .wrong-list { display: flex; flex-direction: column; gap: 14px; }
  .wrong-item {
    background: var(--surface);
    border: 1px solid rgba(248,113,113,.25);
    border-radius: var(--radius);
    padding: 20px 20px;
  }
  .wrong-q {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.6;
    word-break: keep-all;
  }
  .wrong-ans {
    font-size: 13px;
    color: var(--green);
    margin-bottom: 6px;
  }
  .wrong-exp {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.65;
    word-break: keep-all;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .06em;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 14px;
    margin-top: 4px;
  }

  /* 멀티 정답 표시 */
  .multi-badge {
    font-size: 11px;
    background: rgba(251,191,36,.15);
    color: var(--yellow);
    border-radius: 5px;
    padding: 2px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">ISTQB CTFL 4.0 · SAMPLE C</div>
  <div class="score-badge">
    <span class="ok" id="okCnt">✓ 0</span>
    <span class="ng" id="ngCnt">✗ 0</span>
  </div>
</div>

<!-- 진행바 -->
<div class="progress-wrap" id="progressWrap">
  <div class="progress-info">
    <span id="progText">1 / 40</span>
    <span id="progPct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
</div>

<!-- 문제 카드 -->
<div class="card" id="quizCard">
  <div class="q-meta">
    <span class="q-num" id="qNum">Q1</span>
    <span class="q-lo" id="qLO">FL-1.1.1 · K1</span>
    <span class="multi-badge" id="multiBadge" style="display:none">복수 선택</span>
  </div>
  <div class="q-text" id="qText"></div>
  <div class="opts" id="opts"></div>
  <div class="explanation" id="explanation"></div>
</div>
<button class="btn-next" id="btnNext" onclick="nextQ()">다음 문제 →</button>

<!-- 결과 화면 -->
<div id="resultView">
  <div class="result-hero">
    <div class="result-score" id="resPct">0%</div>
    <div class="result-label" id="resLabel">퀴즈 완료!</div>
    <div class="result-stats">
      <div class="stat"><div class="stat-val ok" id="resOk">0</div><div class="stat-key">정답</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--text)" id="resTotal">40</div><div class="stat-key">전체</div></div>
      <div class="stat"><div class="stat-val ng" id="resNg">0</div><div class="stat-key">오답</div></div>
    </div>
    <div class="result-btns">
      <button class="btn-outline" onclick="retryWrong()" id="btnRetry">오답만 다시 풀기</button>
      <button class="btn-primary" onclick="retryAll()">전체 다시 풀기</button>
    </div>
  </div>
  <div class="section-title" id="wrongTitle"></div>
  <div class="wrong-list" id="wrongList"></div>
</div>

<script>
// ──────────────────────────────────────────
// 문제 데이터 (샘플 C 40문제 전체 + 해설)
// ──────────────────────────────────────────
const QUESTIONS = [
  {
    q:"다음 중 테스트의 일반적인 목적인 것은?",
    opts:["기록된 요구사항이 충족됐는지 확인하는 벨리데이션","장애 유발 및 결함 식별","오류 유발 및 근본 원인 식별","테스트 대상이 사용자 기대를 충족하는지 확인하는 베리피케이션"],
    ans:[1], lo:"FL-1.1.1 · K1",
    exp:"<strong>정답: b)</strong> 장애를 유발하고 결함을 식별하는 것은 동적 테스팅의 가장 일반적인 목적입니다. a)는 벨리데이션/베리피케이션 혼용 오류, c)는 오류(사람 실수)를 유발할 수 없음, d)는 베리피케이션↔벨리데이션 뒤바뀜."
  },
  {
    q:"다음 중 테스팅과 디버깅의 차이를 가장 잘 설명한 것은?",
    opts:["테스팅은 장애를 일으키고 디버깅은 장애를 수정한다","테스팅은 부정적인 활동이고 디버깅은 긍정적인 활동이다","테스팅은 결함이 존재하는지 판단하고 디버깅은 결함을 제거한다","테스팅은 결함의 원인을 찾고 디버깅은 결함의 원인을 수정한다"],
    ans:[2], lo:"FL-1.1.2 · K2",
    exp:"<strong>정답: c)</strong> 테스팅은 결함 존재 여부를 판단하고, 디버깅은 결함을 찾아 제거합니다. a) 디버깅은 장애가 아닌 결함을 수정합니다. d) 테스팅은 결함 원인을 찾지 않습니다(디버깅의 역할)."
  },
  {
    q:"'결함 부재의 궤변(absence-of-defects-fallacy)'은 테스팅의 원리 중 하나이다. 다음 중 실무에서 이것에 대처하는 예제로 적절한 것은?",
    opts:["테스팅으로 결함이 없음을 증명하기는 불가능하다는 것을 설명한다","최종 사용자가 인수 테스팅을 수행하도록 지원한다","인도된 시스템에 구현 결함이 남아있지 않음을 확인한다","잔존 결함의 최소화를 위해 장애를 유발하지 않는 테스트를 수정한다"],
    ans:[1], lo:"FL-1.3.1 · K2",
    exp:"<strong>정답: b)</strong> 결함 부재의 궤변은 '결함이 없어도 사용자 기대를 못 충족하면 의미 없다'는 원리입니다. 최종 사용자가 인수 테스팅을 수행하도록 지원하면 사용자 요구·기대 충족 여부를 직접 검증할 수 있습니다."
  },
  {
    q:"다음 테스트 활동 중 경계값 분석과 동등 분할을 적용할 가능성이 가장 큰 활동 두(2)개를 고르시오.",
    opts:["테스트 구현","테스트 설계","테스트 실행","테스트 모니터링","테스트 분석"],
    ans:[1,4], lo:"FL-1.4.1 · K2", multi:true,
    exp:"<strong>정답: b), e)</strong> 테스트 분석은 테스트 컨디션 식별 시, 테스트 설계는 테스트 케이스 도출 시 경계값 분석·동등 분할 같은 테스트 기법을 사용합니다. 구현·실행·모니터링 단계에서는 기법을 새로 적용하지 않습니다."
  },
  {
    q:"다음과 같은 테스트웨어 유형이 주어지고 (1.커버리지 항목 / 2.변경 요청 / 3.테스트 실행 일정 / 4.테스트 컨디션 우선순위), 테스트 활동 A.테스트 분석 / B.테스트 설계 / C.테스트 구현 / D.테스트 완료 가 있다. 다음 중 위 테스트 활동에서 작성되는 테스트웨어를 가장 적절하게 연결한 것은?",
    opts:["1B, 2D, 3C, 4A","1B, 2D, 3A, 4C","1D, 2C, 3A, 4B","1D, 2C, 3B, 4A"],
    ans:[0], lo:"FL-1.4.3 · K2",
    exp:"<strong>정답: a) 1B, 2D, 3C, 4A</strong> · 커버리지 항목→테스트 설계(B) · 변경 요청→테스트 완료(D) · 테스트 실행 일정→테스트 구현(C) · 테스트 컨디션 우선순위→테스트 분석(A)"
  },
  {
    q:"다음 중 테스팅 역할에 대한 설명으로 가장 적절한 것은?",
    opts:["애자일에서 테스트 관리 역할은 주로 팀이 책임지며, 테스팅 역할은 팀 외부 특정 개인이 진다","테스팅 역할은 주로 테스트 모니터링과 제어를 담당하고, 테스트 관리 역할은 테스트 계획·완료를 담당한다","애자일에서 여러 팀에 걸친 테스트 관리 활동은 팀 외부 테스트 관리자가 주로 처리하며 일부는 팀 자체에서 처리한다","테스트 관리 역할은 주로 테스트 분석·설계를 담당하고 테스팅 역할은 테스트 구현·실행을 담당한다"],
    ans:[2], lo:"FL-1.4.5 · K2",
    exp:"<strong>정답: c)</strong> 애자일에서 팀 내부 테스트 관리는 팀 자체가 처리하고, 여러 팀에 걸친 활동은 팀 외부 테스트 관리자가 담당합니다. 테스팅 역할은 팀 내 전체 구성원이 함께 수행합니다."
  },
  {
    q:"다음 중 전체 팀 접근법(whole-team approach)의 장점인 것은?",
    opts:["테스터가 없는 팀","향상된 팀 역학","전문가 팀 멤버","보다 큰 팀의 규모"],
    ans:[1], lo:"FL-1.5.2 · K1",
    exp:"<strong>정답: b)</strong> 전체 팀 접근법은 각 팀원의 다양한 기술을 효과적으로 활용해 우수한 팀 역학을 조성하고 시너지를 창출합니다. 전문화나 팀 규모가 이 접근법의 장점은 아닙니다."
  },
  {
    q:"다음 중 테스팅의 독립성에 대한 설명으로 맞는 것은?",

// 앱 상태
// ──────────────────────────────────────────
let queue = [];       // 현재 풀 문제 인덱스 배열
let cur = 0;          // queue 내 현재 위치
let okCnt = 0;
let ngCnt = 0;
let answers = [];     // {q, chosen, correct}
let selectedMulti = new Set();
let answered = false;

function init(list) {
  queue = list;
  cur = 0; okCnt = 0; ngCnt = 0;
  answers = [];
  document.getElementById('resultView').style.display = 'none';
  document.getElementById('quizCard').style.display = 'block';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('btnNext').className = 'btn-next';
  showQ();
}

function showQ() {
  if (cur >= queue.length) { showResult(); return; }
  answered = false;
  selectedMulti = new Set();
  const q = QUESTIONS[queue[cur]];
  const total = queue.length;
  const pct = Math.round(cur / total * 100);

  document.getElementById('progText').textContent = `${cur + 1} / ${total}`;
  document.getElementById('progPct').textContent = `${pct}%`;
  document.getElementById('progFill').style.width = pct + '%';

  document.getElementById('qNum').textContent = `Q${cur + 1}`;
  document.getElementById('qLO').textContent = q.lo || '';
  document.getElementById('multiBadge').style.display = q.multi ? 'inline-block' : 'none';
  document.getElementById('qText').textContent = q.q;
  document.getElementById('explanation').className = 'explanation';
  document.getElementById('explanation').innerHTML = '';
  document.getElementById('btnNext').className = 'btn-next';

  const optsEl = document.getElementById('opts');
  optsEl.innerHTML = '';
  const labels = ['a','b','c','d','e'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.onclick = () => q.multi ? toggleMulti(btn, i) : selectSingle(btn, i);
    btn.innerHTML = `<span class="opt-label">${labels[i]}</span><span>${opt}</span>`;
    optsEl.appendChild(btn);
  });

  // 복수 선택용 확인 버튼
  if (q.multi) {
    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'btn-next show';
    confirmBtn.id = 'multiConfirm';
    confirmBtn.textContent = '선택 완료';
    confirmBtn.style.marginTop = '14px';
    confirmBtn.onclick = confirmMulti;
    optsEl.appendChild(confirmBtn);
  }

  document.getElementById('okCnt').textContent = `✓ ${okCnt}`;
  document.getElementById('ngCnt').textContent = `✗ ${ngCnt}`;
}

function toggleMulti(btn, idx) {
  if (answered) return;
  if (selectedMulti.has(idx)) {
    selectedMulti.delete(idx);
    btn.style.borderColor = '';
    btn.style.background = '';
  } else {
    selectedMulti.add(idx);
    btn.style.borderColor = 'var(--accent2)';
    btn.style.background = 'rgba(167,139,250,.12)';
  }
}

function confirmMulti() {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[queue[cur]];
  const chosen = [...selectedMulti].sort();
  const correct = [...q.ans].sort();
  const isOk = JSON.stringify(chosen) === JSON.stringify(correct);

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    btn.style.borderColor = '';
    btn.style.background = '';
    if (q.ans.includes(i)) btn.classList.add('correct');
    else if (selectedMulti.has(i)) btn.classList.add('wrong');
  });

  finishAnswer(isOk, chosen);
}

function selectSingle(btn, idx) {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[queue[cur]];
  const isOk = q.ans[0] === idx;

  document.querySelectorAll('.opt-btn').forEach((b, i) => {
    b.disabled = true;
    if (q.ans.includes(i)) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
  });

  finishAnswer(isOk, [idx]);
}

function finishAnswer(isOk, chosen) {
  const q = QUESTIONS[queue[cur]];
  if (isOk) okCnt++; else ngCnt++;

  document.getElementById('okCnt').textContent = `✓ ${okCnt}`;
  document.getElementById('ngCnt').textContent = `✗ ${ngCnt}`;

  document.getElementById('explanation').innerHTML = q.exp || '';
  document.getElementById('explanation').className = 'explanation show';

  // 복수 확인 버튼 숨기기
  const mc = document.getElementById('multiConfirm');
  if (mc) mc.remove();

  document.getElementById('btnNext').className = 'btn-next show';
  answers.push({ q, chosen, correct: isOk });
}

function nextQ() {
  cur++;
  showQ();
}

function showResult() {
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('btnNext').className = 'btn-next';
  document.getElementById('resultView').style.display = 'block';

  const total = answers.length;
  const pct = Math.round(okCnt / total * 100);
  document.getElementById('resPct').textContent = pct + '%';
  document.getElementById('resLabel').textContent = pct >= 65 ? '🎉 합격권 달성!' : '조금 더 분발해요!';
  document.getElementById('resOk').textContent = okCnt;
  document.getElementById('resNg').textContent = ngCnt;
  document.getElementById('resTotal').textContent = total;

  const wrongs = answers.filter(a => !a.correct);
  const btnRetry = document.getElementById('btnRetry');
  if (wrongs.length === 0) {
    btnRetry.style.display = 'none';
    document.getElementById('wrongTitle').textContent = '';
    document.getElementById('wrongList').innerHTML = '<div style="text-align:center;color:var(--green);font-weight:700;padding:20px">🎉 전부 정답!</div>';
  } else {
    btnRetry.style.display = '';
    document.getElementById('wrongTitle').textContent = `오답 목록 (${wrongs.length}문제)`;
    const labels = ['a','b','c','d','e'];
    document.getElementById('wrongList').innerHTML = wrongs.map(a => `
      <div class="wrong-item">
        <div class="wrong-q">${a.q.q}</div>
        <div class="wrong-ans">✅ 정답: ${a.q.ans.map(i => labels[i] + ') ' + a.q.opts[i]).join(', ')}</div>
        <div class="wrong-exp">${a.q.exp || ''}</div>
      </div>`).join('');
  }
}

function retryAll() {
  init([...Array(QUESTIONS.length).keys()]);
}

function retryWrong() {
  const wrongIdx = answers.reduce((acc, a, i) => {
    if (!a.correct) acc.push(queue[i]);
    return acc;
  }, []);
  if (wrongIdx.length === 0) return;
  init(wrongIdx);
}

// 시작
init([...Array(QUESTIONS.length).keys()]);
</script>
</body>
