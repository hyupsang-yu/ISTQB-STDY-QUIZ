<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISTQB 30일 학습</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }

    .wrap { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; }

    /* 헤더 */
    .header {
      background: #fff;
      padding: 20px 16px 14px;
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 1px 0 #e2e8f0;
    }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .header-sub { font-size: 11px; color: #94a3b8; font-weight: 600; letter-spacing: 1px; }
    .header-title { font-size: 20px; font-weight: 800; color: #0f172a; margin-top: 2px; }
    .badge-count {
      text-align: right; background: #f8faff;
      border-radius: 12px; padding: 8px 14px;
    }
    .badge-num { font-size: 26px; font-weight: 800; color: #6366f1; line-height: 1; }
    .badge-num span { font-size: 13px; color: #cbd5e1; font-weight: 400; }
    .badge-label { font-size: 10px; color: #94a3b8; }
    .progress-bar-wrap { height: 6px; background: #f1f5f9; border-radius: 3px; margin-top: 12px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); border-radius: 3px; transition: width 0.4s; }

    /* 챕터 태그 */
    .chapter-tags { padding: 12px 16px 8px; display: flex; gap: 6px; flex-wrap: wrap; }
    .ch-tag { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }

    /* 일별 카드 */
    .day-list { padding: 0 12px; }
    .day-card {
      display: flex; align-items: center; gap: 12px;
      background: #fff; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 8px;
      cursor: pointer; border-left: 3px solid #e2e8f0;
      transition: box-shadow 0.15s;
    }
    .day-card:active { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .day-circle {
      width: 34px; height: 34px; border-radius: 50%;
      background: #f1f5f9;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .day-circle.done { background: var(--col); }
    .day-circle .check { color: #fff; font-size: 16px; }
    .day-circle .num { font-size: 12px; font-weight: 700; color: #94a3b8; }
    .day-info { flex: 1; min-width: 0; }
    .day-title { font-size: 14px; font-weight: 600; color: #1e293b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .day-meta { display: flex; gap: 6px; margin-top: 3px; align-items: center; }
    .day-score { font-size: 11px; color: #94a3b8; }
    .arrow { color: #e2e8f0; font-size: 18px; }

    /* 상세 오버레이 */
    .overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,0.4);
      z-index: 100; display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .sheet {
      background: #fff; width: 100%; max-width: 480px; margin: 0 auto;
      border-radius: 20px 20px 0 0;
      padding: 0 0 40px;
      max-height: 85vh; overflow-y: auto;
      transform: translateY(100%); transition: transform 0.3s;
    }
    .overlay.open .sheet { transform: translateY(0); }
    .sheet-handle { width: 40px; height: 4px; background: #e2e8f0; border-radius: 2px; margin: 12px auto 0; }
    .sheet-header { padding: 16px 16px 0; }
    .sheet-chapter-tag { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 10px; display: inline-block; }
    .sheet-title { font-size: 18px; font-weight: 800; color: #0f172a; margin-top: 6px; }
    .sheet-body { padding: 12px 16px; }
    .summary-box {
      background: #eef2ff; border: 1px solid #c7d2fe;
      border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
    }
    .summary-label { font-size: 11px; font-weight: 700; color: #6366f1; margin-bottom: 6px; }
    .summary-text { font-size: 13px; color: #3730a3; line-height: 1.75; }
    .topics-box { background: #fff; border: 1px solid #f1f5f9; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
    .topics-label { font-size: 13px; font-weight: 700; color: #0f172a; margin-bottom: 10px; }
    .topic-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f8fafc; }
    .topic-item:last-child { border-bottom: none; }
    .topic-num {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .topic-num span { font-size: 10px; font-weight: 800; }
    .topic-text { font-size: 14px; color: #334155; }
    .review-box {
      background: #fefce8; border: 1px solid #fde68a;
      border-radius: 12px; padding: 10px 14px; margin-bottom: 14px;
      font-size: 12px; color: #78350f;
    }
    .quiz-btn {
      width: 100%; background: #6366f1; color: #fff;
      border: none; border-radius: 12px; padding: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .quiz-btn:active { opacity: 0.85; }
    .last-score { text-align: center; margin-top: 8px; font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
<div class="wrap">
  <!-- 헤더 -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-sub">ISTQB CTFL</div>
        <div class="header-title">30일 학습 플랜</div>
      </div>
      <div class="badge-count">
        <div class="badge-num" id="doneCount">0<span>/30</span></div>
        <div class="badge-label">일 완료</div>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <!-- 챕터 태그 -->
  <div class="chapter-tags">
    <span class="ch-tag" style="background:#6366f118;color:#6366f1">1장 기초</span>
    <span class="ch-tag" style="background:#0ea5e918;color:#0ea5e9">2장 SDLC</span>
    <span class="ch-tag" style="background:#10b98118;color:#10b981">3장 정적</span>
    <span class="ch-tag" style="background:#f59e0b18;color:#f59e0b">4장 기법</span>
    <span class="ch-tag" style="background:#ef444418;color:#ef4444">5장 관리</span>
    <span class="ch-tag" style="background:#8b5cf618;color:#8b5cf6">6장 도구</span>
  </div>

  <!-- 일별 목록 -->
  <div class="day-list" id="dayList"></div>
</div>

<!-- 상세 시트 -->
<div class="overlay" id="overlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-chapter-tag" id="sheetTag"></span>
      <div class="sheet-title" id="sheetTitle"></div>
    </div>
    <div class="sheet-body">
      <div class="summary-box">
        <div class="summary-label">📌 핵심 요약</div>
        <div class="summary-text" id="sheetSummary"></div>
      </div>
      <div class="topics-box">
        <div class="topics-label">📚 오늘의 학습 주제</div>
        <div id="sheetTopics"></div>
      </div>
      <div class="review-box" id="reviewBox" style="display:none"></div>
      <button class="quiz-btn" id="quizBtn" onclick="goQuiz()">📝 학습 완료 &amp; 퀴즈 시작</button>
      <div class="last-score" id="lastScore"></div>
    </div>
  </div>
</div>

<script>
  const CH_COLOR = {
    "1장":"#6366f1","2장":"#0ea5e9","3장":"#10b981",
    "4장":"#f59e0b","5장":"#ef4444","6장":"#8b5cf6",
    "복습":"#64748b","전체":"#64748b"
  };

  const CURRICULUM = [
    { day:1,  title:"테스팅이란 무엇인가?", chapter:"1장", topics:["테스팅의 정의","테스트 목적 7가지","베리피케이션 vs 밸리데이션","동적 테스팅 vs 정적 테스팅"], summary:"소프트웨어 테스팅은 결함을 식별하고 소프트웨어 산출물의 품질을 평가하는 일련의 활동입니다. 테스팅은 단순히 소프트웨어를 실행하는 것이 아니라 계획, 모니터링, 분석, 설계, 구현, 실행, 완료 등 다양한 활동을 포함합니다." },
    { day:2,  title:"테스팅과 디버깅", chapter:"1장", topics:["테스팅 vs 디버깅 차이","동적 테스팅의 장애 유발","정적 테스팅의 결함 직접 식별","확인 테스팅과 리그레션 테스팅"], summary:"테스팅과 디버깅은 별개의 활동입니다. 테스팅은 결함을 식별하고, 디버깅은 결함의 원인을 찾아 제거합니다. 디버깅 프로세스: 장애 재현 → 분석(결함 찾기) → 결함 수정." },
    { day:3,  title:"테스팅이 왜 필요한가?", chapter:"1장", topics:["테스팅이 성공에 기여하는 방법","테스팅 vs 품질보증(QA)","오류·결함·장애·근본원인 구분"], summary:"테스팅은 결함을 비용 효율적으로 식별합니다. QA는 프로세스 중심의 예방 접근법, 테스팅은 제품 지향적 교정 접근법입니다. 오류(사람의 실수) → 결함(버그) → 장애(시스템 문제)." },
    { day:4,  title:"테스팅의 7가지 원리", chapter:"1장", topics:["결함 존재 증명","완벽한 테스팅 불가","조기 테스팅","결함 집중","테스트 효과 감소","정황 의존성","결함 부재의 궤변"], summary:"7원리: ①결함 존재 증명 ②완벽한 테스팅 불가 ③조기 테스팅 ④결함 집중(파레토) ⑤살충제 패러독스 ⑥정황 의존적 ⑦결함 부재는 궤변." },
    { day:5,  title:"테스트 활동과 업무", chapter:"1장", topics:["테스트 계획","테스트 모니터링·제어","테스트 분석","테스트 설계","테스트 구현","테스트 실행","테스트 완료"], summary:"테스트 프로세스 7가지: 계획 → 모니터링/제어 → 분석(무엇을?) → 설계(어떻게?) → 구현 → 실행 → 완료. 순차적이 아닌 반복적/병렬로 수행됩니다." },
    { day:6,  title:"테스트웨어와 추적성", chapter:"1장", topics:["테스트웨어 종류","각 활동별 산출물","추적성의 가치","커버리지 조건"], summary:"추적성이란 테스트 베이시스 ↔ 테스트웨어 ↔ 테스트 결과 ↔ 결함 간의 연관성을 유지하는 것으로, 커버리지 평가와 변경 영향 파악에 필수적입니다." },
    { day:7,  title:"테스팅 역할과 필수 기술", chapter:"1장", topics:["테스트 관리 역할","테스팅 역할","보편적 기술","전체 팀 접근법","테스팅의 독립성"], summary:"두 가지 주요 역할: 테스트 관리자(계획/모니터링/제어/완료)와 테스터(분석/설계/구현/실행). 독립성 수준: 저자 자신 → 동료 → 외부팀 → 외부조직." },
    { day:8,  title:"SDLC와 테스팅 관계", chapter:"2장", topics:["순차적 개발모델","반복적/점진적 모델","애자일에서의 테스팅","SDLC가 테스팅에 미치는 영향"], summary:"SDLC 모델 선택은 테스트 활동 범위/시기, 문서 수준, 기법/접근법 선택, 자동화 범위에 영향을 줍니다. 애자일은 경량 산출물과 테스트 자동화를 선호합니다." },
    { day:9,  title:"TDD/ATDD/BDD", chapter:"2장", topics:["좋은 테스팅 프랙티스 4가지","TDD","ATDD","BDD(Given/When/Then)"], summary:"TDD: 테스트 먼저 작성 후 코드. ATDD: 인수 조건에서 테스트 도출. BDD: Given/When/Then 형식으로 자연어 테스트 작성. 모두 시프트 레프트 원리를 따릅니다." },
    { day:10, title:"DevOps와 시프트 레프트", chapter:"2장", topics:["DevOps의 테스팅 이점","DevOps 리스크","시프트 레프트 정의","시프트 레프트 프랙티스","회고와 프로세스 개선"], summary:"DevOps는 CI/CD를 통해 빠른 피드백과 리그레션 자동화를 제공합니다. 시프트 레프트는 테스트를 더 일찍 수행하는 접근법입니다." },
    { day:11, title:"테스트 레벨", chapter:"2장", topics:["컴포넌트 테스팅(단위)","컴포넌트 통합 테스팅","시스템 테스팅","시스템 통합 테스팅","인수 테스팅(UAT 등)"], summary:"5가지 테스트 레벨: ①컴포넌트(단위) ②컴포넌트 통합 ③시스템 ④시스템 통합 ⑤인수(UAT, 운영, 계약, 알파/베타)." },
    { day:12, title:"테스트 유형과 확인/리그레션", chapter:"2장", topics:["기능 테스팅","비기능 테스팅(ISO 25010)","블랙박스 테스팅","화이트박스 테스팅","확인 테스팅","리그레션 테스팅"], summary:"기능(무엇을)/비기능(얼마나 잘)/블랙박스(명세 기반)/화이트박스(구조 기반). 확인 테스팅은 결함 수정 확인, 리그레션 테스팅은 변경으로 인한 부정적 영향 확인." },
    { day:13, title:"유지보수 테스팅", chapter:"2장", topics:["유지보수 범주","유지보수 테스팅 범위 결정 요소","유지보수 테스팅 계기 3가지"], summary:"유지보수 테스팅 계기: ①수정사항(릴리스, 핫픽스) ②운영환경 업그레이드/마이그레이션 ③단종. 범위는 변경 리스크 수준, 기존 시스템 크기, 변경사항 크기로 결정됩니다." },
    { day:14, title:"1·2장 복습 및 정리", chapter:"복습", topics:["1장 핵심 정리","2장 핵심 정리","주요 용어 복습"], summary:"테스팅의 기초와 SDLC 전반 복습. 특히 7가지 원리, 테스트 레벨, 테스트 유형의 차이를 확실히 구분할 수 있어야 합니다." },
    { day:15, title:"정적 테스팅 기초", chapter:"3장", topics:["정적 테스팅 정의","검사 가능한 작업 산출물","정적 테스팅의 가치","정적 vs 동적 테스팅 차이"], summary:"정적 테스팅은 소프트웨어를 실행하지 않고 평가합니다. 동적 테스팅보다 더 저렴하게 결함 식별 가능. 비-실행 산출물에도 적용 가능합니다." },
    { day:16, title:"피드백과 리뷰 프로세스", chapter:"3장", topics:["조기 피드백의 이점","리뷰 프로세스 5단계","리뷰에서의 역할과 책임"], summary:"리뷰 프로세스: 계획 → 리뷰 착수 → 개별 리뷰 → 논의/분석 → 수정/보고. 역할: 관리자/저자/중재자/서기/리뷰어/리뷰 리더." },
    { day:17, title:"리뷰 유형과 성공 요소", chapter:"3장", topics:["비공식 리뷰","워크쓰루","기술 리뷰","인스펙션","리뷰 성공 요소"], summary:"리뷰 유형(공식성 순): 비공식 → 워크쓰루(저자 리드) → 기술 리뷰(중재자 리드) → 인스펙션(가장 공식적, 최대 결함 발견, 메트릭 수집)." },
    { day:18, title:"블랙박스 기법 - 동등분할/경계값", chapter:"4장", topics:["동등 분할(EP) 개념","유효/비유효 분할","이치 초이스 커버리지","경계값 분석(BVA)","2값 vs 3값 경계값"], summary:"동등분할: 같은 분할의 값은 동일하게 처리됨. 경계값 분석: 2값(경계값+인접값), 3값(경계값+양쪽 이웃값). 3값이 더 엄격합니다." },
    { day:19, title:"블랙박스 기법 - 결정테이블/상태전이", chapter:"4장", topics:["결정 테이블 구조","제한입력 vs 확장입력","상태 전이 다이어그램","상태 테이블","3가지 커버리지 기준"], summary:"결정 테이블: 조건 조합별 동작 결과 정리. 상태 전이 커버리지: ①모든 상태 ②유효 전이(0-스위치) ③모든 전이(유효+비유효). 강도: ① < ② < ③." },
    { day:20, title:"화이트박스 기법", chapter:"4장", topics:["구문 테스팅과 구문 커버리지","분기 테스팅과 분기 커버리지","분기 커버리지 > 구문 커버리지","화이트박스 테스팅의 가치와 한계"], summary:"구문 커버리지: 실행 구문/전체 구문. 분기 커버리지: 실행 분기/전체 분기. 100% 분기 달성 시 구문 커버리지도 달성(역은 성립 안 함)." },
    { day:21, title:"경험 기반 기법", chapter:"4장", topics:["오류 추정(결함 공격)","탐색적 테스팅(세션 기반)","체크리스트 기반 테스팅"], summary:"오류 추정: 테스터 경험으로 결함 예측. 탐색적 테스팅: 설계/실행/평가 동시 수행, 테스트 차터 사용. 체크리스트 기반: 경험 기반 체크리스트로 테스트." },
    { day:22, title:"협업 기반 테스트 접근법", chapter:"4장", topics:["사용자 스토리 3C","INVEST 기준","인수 조건 작성법","ATDD 프로세스"], summary:"사용자 스토리 INVEST: Independent/Negotiable/Valuable/Estimable/Small/Testable. 인수 조건: 시나리오 기반(Given/When/Then) 또는 규칙 기반." },
    { day:23, title:"테스트 계획", chapter:"5장", topics:["테스트 계획서 목적과 내용","릴리스/반복 주기 계획 기여","시작 조건(Entry) vs 완료 조건(Exit)","완료의 정의(DoD)"], summary:"테스트 계획서 주요 내용: 테스팅 정황/가정/제약, 이해관계자, 의사소통, 리스크 목록, 테스트 접근법, 예산/일정." },
    { day:24, title:"테스트 추정 기법", chapter:"5장", topics:["비율 기반 추정","외삽법","와이드밴드 델파이/플래닝 포커","3점 추정 공식 E=(a+4m+b)/6"], summary:"추정 기법 4가지: ①비율 기반 ②외삽법(반복적 SDLC 적합) ③와이드밴드 델파이(전문가 합의) ④3점 추정(낙관/확률/비관, SD=(b-a)/6)." },
    { day:25, title:"테스트 우선순위와 피라미드/사분면", chapter:"5장", topics:["리스크/커버리지/요구사항 기반 우선순위","테스트 피라미드 개념","테스팅 사분면 4가지"], summary:"피라미드: 하층(많고 빠른 단위 테스트) → 상층(적고 느린 E2E). 사분면: Q1(기술/팀지원) Q2(비즈니스/팀지원) Q3(비즈니스/제품평가) Q4(기술/제품평가)." },
    { day:26, title:"리스크 관리", chapter:"5장", topics:["리스크 정의(발생가능성×영향)","프로젝트 리스크 vs 제품 리스크","제품 리스크 분석(식별+평가)","제품 리스크 제어(완화+모니터링)"], summary:"리스크 수준 = 발생 가능성 × 영향. 프로젝트 리스크(조직/인력/기술/공급업체)와 제품 리스크(품질 특성) 구분. 리스크 기반 테스팅으로 우선순위 결정." },
    { day:27, title:"테스트 모니터링·제어·완료", chapter:"5장", topics:["테스트 메트릭 종류","테스트 진행 보고서 내용","테스트 완료 보고서 내용","테스팅 상황 전달 방법"], summary:"주요 메트릭: 프로젝트/테스트 진행/제품 품질/결함/리스크/커버리지/비용. 진행 보고서는 정기적, 완료 보고서는 레벨 종료 시 작성." },
    { day:28, title:"형상 관리와 결함 관리", chapter:"5장", topics:["형상 관리 역할","베이스라인","결함 관리 프로세스","결함 보고서 필수 내용"], summary:"형상 관리: 모든 테스트 산출물에 고유 식별자 부여, 버전 관리, 추적성 유지. 결함 보고서: 고유 ID/제목/날짜·작성자/재현 절차/기대 결과 vs 실제 결과/심각도/우선순위." },
    { day:29, title:"테스트 도구와 자동화", chapter:"6장", topics:["테스트 도구 유형 9가지","테스트 자동화 효과 6가지","테스트 자동화 리스크 7가지"], summary:"자동화 효과: 시간 절약/일관성/객관적 평가/실행시간 단축. 도구 도입이 성공을 보장하지 않음." },
    { day:30, title:"최종 복습 및 시험 대비", chapter:"전체", topics:["핵심 개념 총정리","주요 숫자 암기(7원리, 5레벨, 4유형 등)","시험 전략"], summary:"최종 정리: 7가지 테스팅 원리, 5가지 테스트 레벨, 4가지 테스트 유형, 4가지 블랙박스 기법, 4가지 추정 기법, 4가지 리뷰 유형, 4가지 테스팅 사분면." },
  ];

  // progress: { 1: { studied: true, quizScore: 5, quizTotal: 8 }, ... }
  let progress = JSON.parse(localStorage.getItem('istqb_progress') || '{}');
  let currentDay = null;

  function saveProgress() {
    localStorage.setItem('istqb_progress', JSON.stringify(progress));
  }

  function getCompletedDays() {
    return Object.values(progress).filter(p => p?.studied).length;
  }

  function renderHeader() {
    const done = getCompletedDays();
    document.getElementById('doneCount').innerHTML = `${done}<span>/30</span>`;
    document.getElementById('progressBar').style.width = `${(done / 30) * 100}%`;
  }

  function renderList() {
    const list = document.getElementById('dayList');
    list.innerHTML = '';
    CURRICULUM.forEach(c => {
      const done = progress[c.day]?.studied;
      const col = CH_COLOR[c.chapter] || '#64748b';
      const card = document.createElement('div');
      card.className = 'day-card';
      card.style.borderLeftColor = done ? col : '#e2e8f0';
      card.innerHTML = `
        <div class="day-circle ${done ? 'done' : ''}" style="${done ? `background:${col}` : ''}">
          ${done ? '<span class="check">✓</span>' : `<span class="num">${c.day}</span>`}
        </div>
        <div class="day-info">
          <div class="day-title">${c.title}</div>
          <div class="day-meta">
            <span class="ch-tag" style="background:${col}18;color:${col};font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700">${c.chapter}</span>
            ${done && progress[c.day]?.quizScore !== undefined
              ? `<span class="day-score">퀴즈 ${progress[c.day].quizScore}/${progress[c.day].quizTotal}</span>`
              : ''}
          </div>
        </div>
        <span class="arrow">›</span>
      `;
      card.onclick = () => openSheet(c.day);
      list.appendChild(card);
    });
  }

  function openSheet(day) {
    currentDay = day;
    const c = CURRICULUM[day - 1];
    const col = CH_COLOR[c.chapter] || '#64748b';
    const p = progress[day] || {};

    document.getElementById('sheetTag').textContent = `${c.chapter} · Day ${day}`;
    document.getElementById('sheetTag').style.cssText = `background:${col}18;color:${col}`;
    document.getElementById('sheetTitle').textContent = c.title;
    document.getElementById('sheetSummary').textContent = c.summary;

    // 주제 목록
    const topicsEl = document.getElementById('sheetTopics');
    topicsEl.innerHTML = c.topics.map((t, i) => `
      <div class="topic-item">
        <div class="topic-num" style="background:${col}18">
          <span style="color:${col}">${i + 1}</span>
        </div>
        <span class="topic-text">${t}</span>
      </div>
    `).join('');

    // 복습 안내
    const reviewBox = document.getElementById('reviewBox');
    if (day > 1) {
      reviewBox.style.display = 'block';
      reviewBox.textContent = `🔄 퀴즈에서 Day ${Math.max(1, day - 3)}~${day - 1} 내용도 함께 출제돼요!`;
    } else {
      reviewBox.style.display = 'none';
    }

    // 퀴즈 버튼
    const btn = document.getElementById('quizBtn');
    btn.textContent = p.studied ? '🔁 다시 퀴즈 풀기' : '📝 학습 완료 & 퀴즈 시작';

    // 마지막 점수
    const scoreEl = document.getElementById('lastScore');
    scoreEl.textContent = p.studied && p.quizScore !== undefined
      ? `마지막 퀴즈: ${p.quizScore}/${p.quizTotal} 정답`
      : '';

    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeSheet(e) {
    if (e.target === document.getElementById('overlay')) {
      document.getElementById('overlay').classList.remove('open');
      document.body.style.overflow = '';
    }
  }

  function goQuiz() {
    if (!currentDay) return;
    // 학습 완료 표시 후 quiz.html로 이동
    progress[currentDay] = { ...(progress[currentDay] || {}), studied: true };
    saveProgress();
    window.location.href = `quiz.html?day=${currentDay}`;
  }

  // 초기 렌더
  renderHeader();
  renderList();
</script>
</body>
