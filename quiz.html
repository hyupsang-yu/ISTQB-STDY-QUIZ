<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISTQB 퀴즈</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
    .wrap { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; }

    .header {
      background: #fff; padding: 14px 16px;
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 1px 0 #e2e8f0;
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .back-btn { background: none; border: none; cursor: pointer; color: #6366f1; font-size: 13px; font-weight: 700; padding: 0; }
    .q-counter { font-size: 12px; color: #94a3b8; font-weight: 600; }
    .progress-bar-wrap { height: 4px; background: #f1f5f9; border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: #6366f1; border-radius: 2px; transition: width 0.3s; }

    .quiz-body { padding: 12px; }
    .day-tag { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 10px; display: inline-block; margin-bottom: 8px; }
    .question-box { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .question-text { font-size: 15px; font-weight: 700; color: #0f172a; line-height: 1.65; }

    .opt {
      background: #fff; border: 1.5px solid #e2e8f0;
      border-radius: 12px; padding: 13px 16px; margin-bottom: 8px;
      cursor: pointer; font-size: 14px; color: #334155;
      line-height: 1.6; display: flex; align-items: flex-start; gap: 8px;
      transition: border-color 0.15s, background 0.15s;
    }
    .opt:active { opacity: 0.8; }
    .opt.correct { background: #f0fdf4; border: 2px solid #22c55e; color: #166534; }
    .opt.wrong   { background: #fef2f2; border: 2px solid #ef4444; color: #991b1b; }
    .opt.disabled { cursor: default; }
    .opt-num { font-weight: 700; flex-shrink: 0; }
    .opt-mark { margin-left: auto; flex-shrink: 0; }

    /* 피드백 + 해설 */
    .feedback { border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; display: none; }
    .feedback.show { display: block; }
    .feedback.ok  { background: #f0fdf4; border: 1px solid #86efac; }
    .feedback.ng  { background: #fef2f2; border: 1px solid #fca5a5; }
    .feedback-title { font-size: 14px; font-weight: 800; }
    .feedback.ok .feedback-title { color: #166534; }
    .feedback.ng .feedback-title { color: #991b1b; }
    .feedback-answer { font-size: 13px; color: #475569; margin-top: 4px; font-weight: 600; }
    .feedback-exp {
      font-size: 12px; color: #475569; line-height: 1.7;
      margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(0,0,0,0.07);
    }
    .feedback-exp b { color: #0f172a; }

    .next-btn {
      width: 100%; background: #6366f1; color: #fff;
      border: none; border-radius: 12px; padding: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer; display: none;
    }
    .next-btn.show { display: block; }

    /* 결과 화면 */
    #resultView { display: none; }
    #quizView   { display: block; }

    .result-wrap { padding: 32px 16px 20px; text-align: center; }
    .result-emoji { font-size: 64px; line-height: 1; }
    .result-title { font-size: 22px; font-weight: 800; color: #0f172a; margin-top: 10px; }
    .result-score { font-size: 48px; font-weight: 800; margin: 8px 0; }
    .result-score span { font-size: 24px; color: #94a3b8; }
    .grade-badge { font-size: 13px; font-weight: 800; padding: 4px 16px; border-radius: 20px; display: inline-block; }

    .result-body { padding: 0 12px; }
    .answers-box { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
    .answers-title { font-size: 13px; font-weight: 800; color: #0f172a; margin-bottom: 12px; }
    .answer-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
    .answer-item:last-child { border-bottom: none; }
    .answer-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .answer-q { font-size: 13px; color: #334155; line-height: 1.5; font-weight: 600; }
    .answer-correct { font-size: 12px; color: #6366f1; margin-top: 3px; }
    .answer-exp { font-size: 11px; color: #64748b; margin-top: 3px; line-height: 1.5; }

    .btn-row { display: flex; gap: 8px; padding: 0 12px; margin-top: 4px; }
    .btn-secondary { flex: 1; background: #fff; color: #6366f1; border: 1.5px solid #6366f1; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-primary { flex: 1; background: #6366f1; color: #fff; border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-next { width: calc(100% - 24px); margin: 8px 12px 0; background: #0f172a; color: #fff; border: none; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
<div class="wrap">

  <!-- 퀴즈 화면 -->
  <div id="quizView">
    <div class="header">
      <div class="header-top">
        <button class="back-btn" onclick="goBack()">← 나가기</button>
        <span class="q-counter" id="qCounter">1 / 8</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar" style="width:12%"></div>
      </div>
    </div>

    <div class="quiz-body">
      <span class="day-tag" id="dayTag"></span>
      <div class="question-box">
        <div class="question-text" id="questionText"></div>
      </div>
      <div id="optList"></div>
      <div class="feedback" id="feedback">
        <div class="feedback-title" id="feedbackTitle"></div>
        <div class="feedback-answer" id="feedbackAnswer"></div>
        <div class="feedback-exp" id="feedbackExp"></div>
      </div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="resultView">
    <div class="result-wrap">
      <div class="result-emoji" id="resultEmoji">🏆</div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-score" id="resultScore"></div>
      <span class="grade-badge" id="gradeBadge"></span>
    </div>
    <div class="result-body">
      <div class="answers-box">
        <div class="answers-title">📋 문항별 결과</div>
        <div id="answerList"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="retry()">🔄 다시 풀기</button>
      <button class="btn-primary" onclick="goHome()">🏠 메인으로</button>
    </div>
    <button class="btn-next" id="btnNextDay" onclick="goNextDay()" style="display:none">
      Day <span id="nextDayNum"></span>로 이동 →
    </button>
  </div>

</div>

<script>
  const CH_COLOR = {
    "1장":"#6366f1","2장":"#0ea5e9","3장":"#10b981",
    "4장":"#f59e0b","5장":"#ef4444","6장":"#8b5cf6",
    "복습":"#64748b","전체":"#64748b"
  };
  const CURRICULUM_CHAPTER = {
    1:"1장",2:"1장",3:"1장",4:"1장",5:"1장",6:"1장",7:"1장",
    8:"2장",9:"2장",10:"2장",11:"2장",12:"2장",13:"2장",14:"복습",
    15:"3장",16:"3장",17:"3장",
    18:"4장",19:"4장",20:"4장",21:"4장",22:"4장",
    23:"5장",24:"5장",25:"5장",26:"5장",27:"5장",28:"5장",
    29:"6장",30:"전체"
  };
  const NUM = ["①","②","③","④"];

  // ─────────────────────────────────────────────────────────
  // QUIZ_BANK: {day, q, opts, ans(0-index), exp(해설)}
  // ─────────────────────────────────────────────────────────
  const QUIZ_BANK = [
    // ── DAY 1 ──
    {day:1,q:"소프트웨어 테스팅에 대한 설명으로 올바른 것은?",opts:["소프트웨어를 실행하여 결과를 확인하는 활동만을 의미한다","결함을 식별하고 소프트웨어 산출물의 품질을 평가하는 일련의 활동이다","테스팅은 항상 소프트웨어를 실행해야 한다","테스팅은 베리피케이션에만 초점을 맞춘다"],ans:1,
    exp:"테스팅은 단순 실행이 아닌 계획·분석·설계·구현·실행·완료 등 다양한 활동을 포함합니다. 정적 테스팅처럼 실행 없이도 수행됩니다."},

    {day:1,q:"밸리데이션(Validation)에 대한 설명으로 옳은 것은?",opts:["시스템이 주어진 명세 요구사항을 충족하는지 확인","시스템이 사용자의 실제 필요를 만족하는지 확인","코드에서 결함을 직접 찾아내는 활동","테스트 결과를 기록하는 활동"],ans:1,
    exp:"밸리데이션은 '제대로 된 걸 만들었나?'를 확인합니다. 베리피케이션이 명세 충족 여부라면, 밸리데이션은 사용자 실제 요구 충족 여부입니다."},

    {day:1,q:"동적 테스팅과 정적 테스팅의 차이로 옳은 것은?",opts:["동적 테스팅은 소프트웨어를 실행하지 않고 정적 테스팅은 실행한다","동적 테스팅은 소프트웨어를 실행하고 정적 테스팅은 실행하지 않는다","둘 다 소프트웨어를 실행한다","둘 다 소프트웨어를 실행하지 않는다"],ans:1,
    exp:"동적 테스팅은 소프트웨어를 실행하여 장애를 유발합니다. 정적 테스팅(리뷰, 정적 분석)은 실행 없이 결함을 직접 식별합니다."},

    {day:1,q:"테스팅으로 할 수 없는 것은?",opts:["결함의 존재를 드러내는 것","소프트웨어 품질에 대한 자신감 제공","소프트웨어에 결함이 없음을 증명","리스크 수준을 낮추는 것"],ans:2,
    exp:"테스팅의 원리 1번: 테스팅은 결함의 존재를 밝히는 것이지, 결함이 없음을 증명하지 않습니다. 테스팅 후에도 잔존 결함이 있을 수 있습니다."},

    {day:1,q:"베리피케이션(Verification)의 핵심 질문은?",opts:["제대로 된 것을 만들었나?","제대로 만들었나?","사용자가 원하는 것인가?","비즈니스 가치가 있는가?"],ans:1,
    exp:"베리피케이션은 '제대로 만들었나?(Are we building the product right?)'입니다. 즉, 명세·설계서대로 구현됐는지 확인합니다."},

    // ── DAY 2 ──
    {day:2,q:"테스팅과 디버깅의 관계로 옳은 것은?",opts:["테스팅과 디버깅은 같은 활동이다","테스팅은 결함을 식별하고 디버깅은 결함의 원인을 찾아 제거한다","디버깅이 테스팅보다 먼저 수행된다","테스터가 디버깅도 담당해야 한다"],ans:1,
    exp:"테스팅과 디버깅은 별개의 활동입니다. 테스팅은 테스터가 결함을 발견하고, 디버깅은 개발자가 원인을 분석하여 수정합니다."},

    {day:2,q:"일반적인 디버깅 프로세스의 순서로 올바른 것은?",opts:["분석 → 장애 재현 → 결함 수정","결함 수정 → 분석 → 장애 재현","장애 재현 → 분석(결함 찾기) → 결함 수정","결함 수정 → 장애 재현 → 분석"],ans:2,
    exp:"디버깅은 ① 장애 재현 → ② 원인 분석(결함 찾기) → ③ 결함 수정 순으로 진행됩니다. 재현이 안 되면 원인을 찾기 어렵습니다."},

    {day:2,q:"확인 테스팅(Confirmation Testing)의 목적은?",opts:["변경으로 인한 부정적 영향 확인","원래 결함이 성공적으로 수정됐는지 확인","새로운 기능이 추가됐는지 확인","성능이 개선됐는지 확인"],ans:1,
    exp:"확인 테스팅은 '이 버그 고쳤어?' 확인입니다. 결함 수정 직후 동일한 방법으로 다시 테스트하여 수정 여부를 검증합니다."},

    {day:2,q:"리그레션 테스팅(Regression Testing)이 자동화에 특히 적합한 이유는?",opts:["한 번만 실행되기 때문","반복적으로 실행되기 때문","복잡한 탐색적 사고가 필요하기 때문","새로운 기능만 테스트하기 때문"],ans:1,
    exp:"리그레션 테스팅은 변경이 생길 때마다 반복 실행됩니다. 같은 테스트를 계속 반복하므로 자동화하면 시간을 크게 절약할 수 있습니다."},

    {day:2,q:"결함 수정 후 두 가지 테스팅을 수행해야 합니다. 올바른 순서와 목적은?",opts:["리그레션 → 확인: 먼저 부작용을 확인 후 수정 여부 확인","확인 → 리그레션: 수정 확인 후 다른 부분에 부정적 영향이 없는지 확인","둘 중 하나만 수행하면 충분하다","순서는 무관하다"],ans:1,
    exp:"먼저 확인 테스팅으로 해당 결함이 수정됐는지 확인하고, 이후 리그레션 테스팅으로 수정으로 인한 부정적 영향이 없는지 확인합니다."},

    // ── DAY 3 ──
    {day:3,q:"오류(Error), 결함(Defect), 장애(Failure)의 관계를 올바르게 설명한 것은?",opts:["장애 → 결함 → 오류 순으로 발생한다","오류로 인해 결함이 발생하고 결함이 실행되면 장애로 이어질 수 있다","결함이 있으면 반드시 장애가 발생한다","장애는 항상 사람의 오류로만 발생한다"],ans:1,
    exp:"인과관계: 오류(사람의 실수) → 결함(코드의 버그) → 장애(실행 시 나타나는 증상). 결함이 있어도 해당 코드가 실행되지 않으면 장애가 안 날 수 있습니다."},

    {day:3,q:"결함이 있어도 장애가 발생하지 않는 경우로 옳은 것은?",opts:["결함이 매우 작은 경우","결함이 있는 코드가 실행되지 않은 경우","테스터가 찾지 못한 경우","개발자가 수정하지 않은 경우"],ans:1,
    exp:"결함(Defect)은 코드에 존재하지만, 그 코드가 실행되지 않으면 장애(Failure)로 이어지지 않습니다. 또한 특정 입력 조건이 맞지 않으면 결함이 활성화되지 않을 수도 있습니다."},

    {day:3,q:"품질 보증(QA)과 테스팅의 차이에 대한 설명으로 옳은 것은?",opts:["QA와 테스팅은 동일한 개념이다","QA는 제품 지향적이고 테스팅은 프로세스 지향적이다","테스팅은 제품 지향적 교정 접근법이고 QA는 프로세스 중심의 예방 접근법이다","QA는 테스팅팀만의 책임이다"],ans:2,
    exp:"테스팅은 제품(소프트웨어)에 초점을 맞추어 결함을 발견합니다(교정). QA는 개발 프로세스를 개선하여 결함이 생기지 않도록 예방합니다(예방)."},

    {day:3,q:"장애(Failure)의 원인이 될 수 없는 것은?",opts:["개발자의 코딩 실수","요구사항의 오류","방사선으로 인한 하드웨어 문제","충분한 테스팅"],ans:3,
    exp:"장애는 오류(사람의 실수), 환경 조건(방사선, 전자기장 등)에 의해 발생할 수 있습니다. 충분한 테스팅은 장애의 원인이 아니라 오히려 장애를 예방/발견하는 활동입니다."},

    {day:3,q:"근본원인(Root Cause) 분석의 목적은?",opts:["결함의 수를 세는 것","오류가 발생한 근본적인 이유를 파악하여 프로세스를 개선하는 것","모든 결함을 수정하는 것","테스터를 평가하는 것"],ans:1,
    exp:"근본원인 분석은 결함이 왜 생겼는지 근본 이유를 찾아 향후 같은 유형의 결함이 생기지 않도록 프로세스를 개선하는 데 활용됩니다."},

    // ── DAY 4 ──
    {day:4,q:"테스팅의 7가지 원리 중 '살충제 패러독스'에 해당하는 것은?",opts:["완벽한 테스팅은 불가능하다","결함은 소수의 컴포넌트에 집중된다","같은 테스트를 반복하면 신규 결함 식별 효과가 줄어든다","테스팅은 결함의 존재를 밝히지 결함 없음을 증명하지 않는다"],ans:2,
    exp:"살충제 패러독스: 같은 테스트를 반복하면 마치 살충제에 내성이 생기듯 새로운 결함을 발견하는 능력이 감소합니다. 테스트 케이스를 주기적으로 갱신해야 합니다."},

    {day:4,q:"'결함은 집중된다'는 원리와 관련된 개념은?",opts:["완벽한 테스팅 불가 원리","파레토 원리(80:20 법칙)","살충제 패러독스","정황 의존성"],ans:1,
    exp:"결함 집중 원리는 파레토 원리와 유사합니다. 대부분의 결함(약 80%)은 소수의 컴포넌트(약 20%)에 집중됩니다. 이를 알면 테스트 우선순위를 정할 수 있습니다."},

    {day:4,q:"'결함-부재는 궤변이다'라는 원리가 의미하는 것은?",opts:["결함이 없으면 소프트웨어는 항상 성공적이다","모든 결함을 수정했더라도 사용자의 요구나 기대에 못 미치는 시스템이 될 수 있다","베리피케이션만으로 충분하다","결함을 찾지 못했으므로 결함이 없다"],ans:1,
    exp:"결함을 모두 수정해도 사용자가 원하지 않거나 사용하기 어렵다면 실패한 소프트웨어입니다. 밸리데이션(사용자 요구 충족 확인)이 중요한 이유입니다."},

    {day:4,q:"'테스팅은 정황에 의존한다'는 원리의 의미는?",opts:["모든 소프트웨어에 동일한 테스트 기법을 적용해야 한다","소프트웨어 유형과 목적에 따라 다른 테스팅 접근법을 사용해야 한다","항상 가장 엄격한 테스팅을 적용해야 한다","정황과 무관하게 완전한 테스팅을 해야 한다"],ans:1,
    exp:"안전-치명적 소프트웨어(항공, 의료)와 일반 전자상거래 앱에는 다른 수준의 테스팅이 필요합니다. 하나의 방법이 모든 상황에 맞지 않습니다."},

    {day:4,q:"'조기 테스팅'의 이점이 아닌 것은?",opts:["결함을 일찍 발견할수록 수정 비용이 적다","정적 테스팅도 조기 테스팅의 일환이다","테스팅을 나중에 할수록 더 많은 결함을 발견한다","요구사항 단계부터 테스터가 참여할 수 있다"],ans:2,
    exp:"조기 테스팅(Shift Left) 원리: 결함은 일찍 발견할수록 수정 비용이 적습니다. 나중에 발견할수록 더 많은 재작업이 필요합니다. 테스팅은 가능한 빨리 시작해야 합니다."},

    // ── DAY 5 ──
    {day:5,q:"테스트 분석 활동에서 도출하는 산출물은?",opts:["테스트 스크립트","테스트 컨디션","테스트 완료 보고서","테스트 로그"],ans:1,
    exp:"테스트 분석은 '무엇을 테스트할까?'를 결정하는 단계입니다. 테스트 베이시스를 분석하여 테스트 컨디션(테스트 조건)을 도출합니다."},

    {day:5,q:"테스트 설계 활동의 주요 산출물은?",opts:["테스트 완료 보고서","테스트 케이스","테스트 로그","테스트 환경"],ans:1,
    exp:"테스트 설계는 '어떻게 테스트할까?'를 결정합니다. 테스트 컨디션을 구체적인 테스트 케이스로 만들고 사용할 기법을 선택합니다."},

    {day:5,q:"테스트 프로세스에서 테스트 활동들의 수행 방식으로 옳은 것은?",opts:["항상 순차적으로 수행된다","반복적 또는 병렬로 구현되는 경우가 많다","항상 병렬로만 수행된다","한 번만 수행되고 반복하지 않는다"],ans:1,
    exp:"테스트 활동(계획→분석→설계→구현→실행→완료)은 SDLC에 따라 순차적일 수도, 반복적·병렬적으로 수행될 수도 있습니다."},

    {day:5,q:"테스트 완료(Test Completion) 활동에서 수행하는 것은?",opts:["테스트 케이스 작성","테스트 환경 설정","교훈 도출 및 테스트 완료 보고서 작성","결함 분류"],ans:2,
    exp:"테스트 완료 단계에서는 완료 보고서 작성, 테스트웨어 보관, 교훈 도출, 잔존 결함 확인 등을 수행합니다. 미래 프로젝트에 재활용하기 위해 산출물을 정리합니다."},

    // ── DAY 6 ──
    {day:6,q:"추적성(Traceability)을 유지하는 주요 목적이 아닌 것은?",opts:["커버리지 평가 지원","변경사항의 영향 파악","테스트 케이스 자동 생성","테스트 감사 용이화"],ans:2,
    exp:"추적성의 이점은 커버리지 평가, 변경 영향 파악, 감사 지원, 이해관계자 소통입니다. 테스트 케이스를 자동으로 생성하는 것은 추적성과 관계없습니다."},

    {day:6,q:"테스트 완료 단계의 작업 산출물에 해당하는 것은?",opts:["테스트 로그","테스트 차터","테스트 완료 보고서와 교훈 문서","테스트 환경 요구사항"],ans:2,
    exp:"테스트 완료 단계 산출물: 테스트 완료 보고서, 개선을 위한 교훈 문서, 변경 요청서 등입니다. 테스트 로그는 실행 단계, 차터는 설계 단계 산출물입니다."},

    {day:6,q:"테스트웨어(Testware)에 해당하지 않는 것은?",opts:["테스트 케이스","테스트 데이터","소프트웨어 소스 코드","테스트 완료 보고서"],ans:2,
    exp:"테스트웨어는 테스트 활동의 결과로 생성된 산출물입니다. 소프트웨어 소스 코드는 개발 산출물로, 테스팅의 대상(테스트 오브젝트)이지 테스트웨어가 아닙니다."},

    // ── DAY 7 ──
    {day:7,q:"테스팅 독립성이 가장 높은 수준은?",opts:["저자가 직접 테스트","같은 팀 동료가 테스트","조직 내 별도 테스트팀이 테스트","외부 조직(아웃소싱)이 테스트"],ans:3,
    exp:"독립성 수준: 저자 자신 < 같은 팀 동료 < 별도 테스트팀 < 외부 조직. 독립성이 높을수록 인지 편향 없이 결함을 더 잘 발견하지만, 소통 비용이 증가할 수 있습니다."},

    {day:7,q:"전체 팀 접근법(Whole Team Approach)의 특징으로 옳지 않은 것은?",opts:["모든 팀원이 품질에 대한 책임을 진다","팀원들은 작업 공간을 공유한다","테스터만이 품질을 담당한다","비즈니스 담당자와 개발자, 테스터가 함께 일한다"],ans:2,

    {day:7,q:"전체 팀 접근법이 적합하지 않을 수 있는 경우는?",opts:["애자일 개발 환경","스타트업 소규모 팀","안전이 치명적인 시스템(항공, 의료 등)","소규모 웹 애플리케이션"],ans:2,
    exp:"항공, 의료 등 안전이 치명적인 시스템에서는 높은 수준의 독립적 테스팅이 필요하므로 전체 팀 접근법보다 독립적인 테스트팀이 더 적합할 수 있습니다."},

    {day:7,q:"테스터에게 필요한 핵심 기술로 옳지 않은 것은?",opts:["분석적 사고력","꼼꼼함과 세부지향","결함을 발견하지 못하도록 숨기는 능력","의사소통 능력"],ans:2,
    exp:"테스터는 결함을 발견하고 명확히 보고해야 합니다. 숨기는 것은 테스터의 역할과 정반대입니다. 의사소통 기술이 중요한 이유는 나쁜 소식(결함)을 개발자에게 잘 전달해야 하기 때문입니다."},

    // ── DAY 8 ──
    {day:8,q:"V-모델에서 각 개발 단계에 대응하는 테스트 레벨이 존재하는 이유는?",opts:["비용을 절감하기 위해","각 개발 단계에서 생성된 산출물을 검증하기 위해","개발자가 테스트하기 쉽게 하기 위해","릴리스 일정을 앞당기기 위해"],ans:1,

    {day:8,q:"애자일 개발에서 테스팅의 특징으로 옳은 것은?",opts:["무거운 문서화와 공식적인 테스트 계획서를 선호한다","가벼운 작업 산출물과 테스트 자동화를 선호한다","테스팅은 릴리스 전 마지막에만 수행된다","각 스프린트에서는 단위 테스팅만 수행한다"],ans:1,
    exp:"애자일에서는 빠른 반복을 위해 가벼운 산출물과 자동화를 선호합니다. 매 스프린트마다 모든 테스트 레벨을 수행할 수 있으며, 리그레션 테스팅 자동화가 핵심입니다."},

    {day:8,q:"SDLC 모델 선택이 테스팅에 영향을 미치는 요소가 아닌 것은?",opts:["테스트 활동의 범위와 시기","테스트 문서의 상세화 수준","테스터의 연봉 수준","테스트 자동화 범위"],ans:2,
    exp:"SDLC 모델은 테스트 활동 범위·시기, 문서 수준, 기법·접근법, 자동화 범위, 테스터 역할에 영향을 줍니다. 테스터의 연봉은 SDLC 모델이 아닌 조직 정책에 따릅니다."},

    // ── DAY 9 ──

    {day:9,q:"ATDD, TDD, BDD의 공통점으로 옳은 것은?",opts:["모두 GUI 레벨 테스팅에 초점을 맞춘다","모두 코드 작성 전에 테스트를 정의한다","모두 수동 테스팅만 사용한다","모두 성능 테스팅에 사용된다"],ans:1,
    exp:"ATDD, TDD, BDD 모두 코드 작성 전에 테스트를 먼저 정의합니다. 이는 조기 테스팅(Shift Left) 원리를 따르는 것이며, 작성된 테스트는 자동화 테스트로 유지됩니다."},

    // ── DAY 10 ──
    {day:10,q:"시프트 레프트(Shift Left)에 대한 설명으로 옳지 않은 것은?",opts:["SDLC 초기에 테스트를 수행하는 접근법이다","SDLC 후반부의 테스트를 무시해도 된다","조기 테스팅 원리와 관련이 있다","명세 리뷰도 시프트 레프트의 프랙티스 중 하나다"],ans:1,

    {day:10,q:"DevOps의 테스팅 이점으로 옳지 않은 것은?",opts:["코드 품질에 대한 빠른 피드백 제공","자동 리그레션 테스트의 규모와 범위가 늘어남","반복적인 수동 테스팅의 필요성을 완전히 제거","안정적인 테스트 환경 구축 촉진"],ans:2,

    {day:10,q:"회고(Retrospective)의 목적은?",opts:["결함을 수정하는 것","테스트 케이스를 작성하는 것","프로세스를 개선하기 위해 무엇이 잘 됐고 개선이 필요한지 논의하는 것","성능을 측정하는 것"],ans:2,
    exp:"회고는 반복 주기 종료 시 팀이 '무엇이 잘 됐나, 무엇이 부족했나, 어떻게 개선할까'를 논의하는 프로세스 개선 활동입니다. 테스트 효율성과 품질을 높이는 데 기여합니다."},

    // ── DAY 11 ──

    {day:28,q:"형상 관리에서 베이스라인(Baseline)에 대한 설명으로 옳은 것은?",opts:["공식적인 변경 제어 없이도 수정 가능하다","형상 항목이 테스팅용으로 승인된 상태를 의미한다","개발 초기 단계에서만 설정된다","테스트 케이스만 포함한다"],ans:1,
    exp:"베이스라인은 형상 항목이 공식적으로 승인된 상태입니다. 이후 변경은 반드시 공식적인 변경 제어 프로세스를 거쳐야 합니다. 베이스라인으로 이전 상태 재현이 가능합니다."},

    {day:28,q:"결함 심각도(Severity)와 수정 우선순위(Priority)의 관계로 옳은 것은?",opts:["항상 심각도가 높으면 우선순위도 높다","심각도와 우선순위는 독립적일 수 있다","우선순위가 높으면 항상 심각도도 높다","심각도와 우선순위는 항상 동일하다"],ans:1,
    exp:"심각도(Severity)는 기술적 영향도, 우선순위(Priority)는 비즈니스적 수정 순서입니다. 오탈자처럼 사소한 결함이라도 홈페이지 메인에 있으면 우선순위가 높을 수 있습니다."},

    // ── DAY 29 ──
    {day:29,q:"테스트 자동화의 효과로 옳은 것은?",opts:["모든 결함을 자동으로 발견한다","반복적 수작업을 줄여 시간을 절약하고 일관성 및 재현성을 향상시킨다","수동 테스팅이 완전히 불필요해진다","코드 품질이 자동으로 향상된다"],ans:1,
    exp:"자동화의 6가지 효과: 시간 절약, 일관성/재현성, 객관적 평가, 정보 접근성, 실행 시간 단축, 창의적 작업 집중. 모든 결함 발견이나 수동 테스팅 완전 대체는 불가능합니다."},

    {day:29,q:"테스트 자동화의 잠재적 리스크로 옳지 않은 것은?",opts:["도구 효과에 대한 비현실적인 기대","도구에 지나치게 의존하여 비판적 사고 무시","반복적 수작업 감소로 인한 시간 절약","오픈소스 소프트웨어의 지원 중단 가능성"],ans:2,
    exp:"반복적 수작업 감소로 인한 시간 절약은 자동화의 '효과'이지 '리스크'가 아닙니다. 자동화 리스크: 비현실적 기대, 비판적 사고 무시, 초기 투자 비용, 지원 중단 가능성 등."},

    {day:29,q:"테스트 자동화 도입 시 고려해야 할 리스크는?",opts:["테스터가 더 창의적인 작업을 할 수 있음","도구 도입·유지보수에 드는 추가 시간과 비용","테스트 실행 시간이 빨라짐","일관성 있는 테스트 결과 획득"],ans:1,
    exp:"자동화 도입 시 도구 설치·설정·유지보수·교육 등에 추가 자원이 필요합니다. 이 비용을 과소평가하면 자동화가 기대에 미치지 못할 수 있습니다."},

    // ── DAY 30 ──
    {day:30,q:"ISTQB CTFL에서 정의한 테스트 레벨의 수는?",opts:["3가지","4가지","5가지","6가지"],ans:2,
    exp:"5가지 테스트 레벨: 컴포넌트 테스팅, 컴포넌트 통합 테스팅, 시스템 테스팅, 시스템 통합 테스팅, 인수 테스팅."},

    {day:30,q:"블랙박스 테스트 기법에 해당하지 않는 것은?",opts:["동등 분할","경계값 분석","구문 테스팅","결정 테이블 테스팅"],ans:2,
    exp:"블랙박스 기법(명세 기반): 동등 분할, 경계값 분석, 결정 테이블, 상태 전이, 유스케이스 테스팅. 구문 테스팅은 코드 내부 구조를 기반으로 하는 화이트박스 기법입니다."},

    {day:30,q:"4가지 리뷰 유형을 공식성이 낮은 순서에서 높은 순서로 나열한 것은?",opts:["인스펙션 > 기술 리뷰 > 워크쓰루 > 비공식 리뷰","비공식 리뷰 > 워크쓰루 > 기술 리뷰 > 인스펙션","기술 리뷰 > 인스펙션 > 워크쓰루 > 비공식 리뷰","워크쓰루 > 비공식 리뷰 > 기술 리뷰 > 인스펙션"],ans:1,
    exp:"공식성 낮음→높음: 비공식 리뷰 < 워크쓰루 < 기술 리뷰 < 인스펙션. 인스펙션이 가장 공식적이고 비공식 리뷰가 가장 덜 공식적입니다."},

    {day:30,q:"경험 기반 테스트 기법이 아닌 것은?",opts:["오류 추정","탐색적 테스팅","체크리스트 기반 테스팅","구문 테스팅"],ans:3,
    exp:"경험 기반 기법: 오류 추정, 탐색적 테스팅, 체크리스트 기반 테스팅. 구문 테스팅은 코드 내부 구조를 기반으로 하는 화이트박스(구조 기반) 기법입니다."},
  ];

  // ─── 퀴즈 로직 ───
  const params = new URLSearchParams(location.search);
  const targetDay = parseInt(params.get('day')) || 1;
  let quizList = [], currentQ = 0, selected = null, answers = [];

  function buildQuiz(day) {
    const todayQs = QUIZ_BANK.filter(q => q.day === day);
    const prevQs = QUIZ_BANK
      .filter(q => q.day < day && q.day >= Math.max(1, day - 3))
      .sort(() => Math.random() - 0.5).slice(0, 3);
    return [...todayQs, ...prevQs].sort(() => Math.random() - 0.5).slice(0, 10);
  }

  function startQuiz() {
    quizList = buildQuiz(targetDay);
    currentQ = 0; selected = null; answers = [];
    renderQuestion();
  }

  function renderQuestion() {
    const q = quizList[currentQ];
    const isToday = q.day === targetDay;
    const col = CH_COLOR[CURRICULUM_CHAPTER[q.day]] || '#64748b';
    const total = quizList.length;

    document.getElementById('qCounter').textContent = `${currentQ + 1} / ${total}`;
    document.getElementById('progressBar').style.width = `${((currentQ + 1) / total) * 100}%`;

    const tag = document.getElementById('dayTag');
    tag.textContent = isToday ? `Day ${q.day} 오늘` : `Day ${q.day} 복습`;
    tag.style.background = col + '18'; tag.style.color = col;

    document.getElementById('questionText').textContent = `Q${currentQ + 1}. ${q.q}`;

    const optList = document.getElementById('optList');
    optList.innerHTML = q.opts.map((opt, i) => `
      <div class="opt" id="opt${i}" onclick="handleAnswer(${i})">
        <span class="opt-num">${NUM[i]}</span>
        <span>${opt}</span>
        <span class="opt-mark" id="mark${i}"></span>
      </div>
    `).join('');

    const fb = document.getElementById('feedback');
    fb.className = 'feedback';
    document.getElementById('nextBtn').className = 'next-btn';
    selected = null;
  }

  function handleAnswer(idx) {
    if (selected !== null) return;
    selected = idx;
    const q = quizList[currentQ];
    const isCorrect = idx === q.ans;

    for (let i = 0; i < q.opts.length; i++) {
      const el = document.getElementById(`opt${i}`);
      el.classList.add('disabled');
      if (i === q.ans) { el.classList.add('correct'); document.getElementById(`mark${i}`).textContent = '✓'; }
      else if (i === idx && !isCorrect) { el.classList.add('wrong'); document.getElementById(`mark${i}`).textContent = '✗'; }
    }

    const fb = document.getElementById('feedback');
    fb.className = `feedback show ${isCorrect ? 'ok' : 'ng'}`;
    document.getElementById('feedbackTitle').textContent = isCorrect ? '🎉 정답!' : '❌ 오답';
    document.getElementById('feedbackAnswer').textContent = isCorrect
      ? '' : `정답: ${NUM[q.ans]} ${q.opts[q.ans]}`;
    document.getElementById('feedbackExp').textContent = q.exp || '';

    const nextBtn = document.getElementById('nextBtn');
    nextBtn.className = 'next-btn show';
    nextBtn.textContent = currentQ + 1 >= quizList.length ? '결과 보기 →' : '다음 문제 →';
  }

  function nextQuestion() {
    answers.push({ q: quizList[currentQ], selected });
    if (currentQ + 1 >= quizList.length) { showResult(); }
    else { currentQ++; renderQuestion(); }
  }

  function showResult() {
    const score = answers.filter(a => a.selected === a.q.ans).length;
    const total = answers.length;
    const pct = Math.round((score / total) * 100);
    const grade = pct >= 80 ? '우수' : pct >= 60 ? '보통' : '복습 필요';
    const gcol = pct >= 80 ? '#22c55e' : pct >= 60 ? '#f59e0b' : '#ef4444';

    const progress = JSON.parse(localStorage.getItem('istqb_progress') || '{}');
    progress[targetDay] = { studied: true, quizScore: score, quizTotal: total };
    localStorage.setItem('istqb_progress', JSON.stringify(progress));

    document.getElementById('resultEmoji').textContent = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📖';
    document.getElementById('resultTitle').textContent = `Day ${targetDay} 완료!`;
    document.getElementById('resultScore').innerHTML = `${score}<span>/${total}</span>`;
    document.getElementById('resultScore').style.color = gcol;
    const badge = document.getElementById('gradeBadge');
    badge.textContent = grade; badge.style.background = gcol + '20'; badge.style.color = gcol;

    document.getElementById('answerList').innerHTML = answers.map((a, i) => {
      const ok = a.selected === a.q.ans;
      return `
        <div class="answer-item">
          <span class="answer-icon">${ok ? '✅' : '❌'}</span>
          <div>
            <p class="answer-q">Q${i + 1}. ${a.q.q}</p>
            ${!ok ? `<p class="answer-correct">정답: ${a.q.opts[a.q.ans]}</p>` : ''}
            <p class="answer-exp">${a.q.exp || ''}</p>
          </div>
        </div>`;
    }).join('');

    if (targetDay < 30) {
      document.getElementById('btnNextDay').style.display = 'block';
      document.getElementById('nextDayNum').textContent = targetDay + 1;
    }
    document.getElementById('quizView').style.display = 'none';
    document.getElementById('resultView').style.display = 'block';
  }

  function retry() {
    document.getElementById('quizView').style.display = 'block';
    document.getElementById('resultView').style.display = 'none';
    startQuiz();
  }
  function goHome() { window.location.href = 'index.html'; }
  function goNextDay() { window.location.href = 'index.html'; }
  function goBack() { window.location.href = 'index.html'; }

  startQuiz();
</script>
