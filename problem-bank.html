<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISTQB 문제 모음집</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; min-height: 100vh; }
    .wrap { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 60px; }

    /* 헤더 */
    .header {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      padding: 20px 16px 16px; position: sticky; top: 0; z-index: 10;
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .header-title { font-size: 16px; font-weight: 800; color: #fff; }
    .header-count { font-size: 12px; color: #94a3b8; font-weight: 600; }
    .progress-bar-wrap { height: 4px; background: #334155; border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); border-radius: 2px; transition: width 0.4s; }
    .stats-row { display: flex; gap: 12px; margin-top: 10px; }
    .stat { font-size: 11px; font-weight: 700; }
    .stat-o { color: #22c55e; }
    .stat-x { color: #ef4444; }
    .stat-left { color: #94a3b8; }

    /* 문제 영역 */
    .body { padding: 12px; }
    .chapter-tag {
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
      display: inline-block; margin-bottom: 8px;
    }
    .question-card { background: #fff; border-radius: 16px; padding: 18px; margin-bottom: 12px; }
    .question-num { font-size: 11px; color: #94a3b8; font-weight: 600; margin-bottom: 6px; }
    .question-text { font-size: 15px; font-weight: 700; color: #0f172a; line-height: 1.7; }

    /* 보기 */
    .opt {
      background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px;
      padding: 13px 16px; margin-bottom: 8px; cursor: pointer;
      font-size: 14px; color: #334155; line-height: 1.6;
      display: flex; align-items: flex-start; gap: 10px;
      transition: all 0.15s;
    }
    .opt:hover:not(.disabled) { border-color: #6366f1; background: #f5f3ff; }
    .opt.correct { background: #f0fdf4; border: 2px solid #22c55e; color: #166534; }
    .opt.wrong   { background: #fef2f2; border: 2px solid #ef4444; color: #991b1b; }
    .opt.disabled { cursor: default; }
    .opt-num { font-weight: 800; flex-shrink: 0; min-width: 20px; }
    .opt-mark { margin-left: auto; flex-shrink: 0; font-size: 16px; }

    /* 해설 */
    .explanation { border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; display: none; }
    .explanation.show { display: block; }
    .explanation.ok { background: #f0fdf4; border: 1px solid #86efac; }
    .explanation.ng { background: #fef2f2; border: 1px solid #fca5a5; }
    .exp-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .exp-result { font-size: 15px; font-weight: 800; }
    .exp-correct-ans { font-size: 12px; font-weight: 700; color: #166534; background: #dcfce7; padding: 2px 8px; border-radius: 6px; }
    .exp-divider { height: 1px; background: rgba(0,0,0,0.08); margin: 8px 0; }
    .exp-label { font-size: 11px; font-weight: 800; color: #6366f1; margin-bottom: 4px; letter-spacing: 0.5px; }
    .exp-text { font-size: 13px; color: #334155; line-height: 1.8; }
    .exp-text b { color: #0f172a; font-weight: 700; }

    /* 버튼 */
    .next-btn {
      width: 100%; background: #6366f1; color: #fff; border: none;
      border-radius: 14px; padding: 15px; font-size: 15px; font-weight: 700;
      cursor: pointer; display: none; transition: opacity 0.15s;
    }
    .next-btn.show { display: block; }
    .next-btn:active { opacity: 0.85; }

    /* 결과 화면 */
    #resultView { display: none; padding: 24px 16px; }
    #quizView { display: block; }

    .result-card { background: #fff; border-radius: 20px; padding: 28px 20px; text-align: center; margin-bottom: 12px; }
    .result-emoji { font-size: 60px; line-height: 1; }
    .result-title { font-size: 20px; font-weight: 800; color: #0f172a; margin-top: 12px; }
    .result-score { font-size: 52px; font-weight: 900; margin: 8px 0; }
    .result-score span { font-size: 22px; color: #94a3b8; font-weight: 600; }
    .result-pct { font-size: 16px; font-weight: 700; color: #64748b; }
    .grade-badge { display: inline-block; font-size: 13px; font-weight: 800; padding: 5px 18px; border-radius: 20px; margin-top: 8px; }

    .wrong-section { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
    .wrong-title { font-size: 13px; font-weight: 800; color: #0f172a; margin-bottom: 12px; }
    .wrong-item { padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
    .wrong-item:last-child { border-bottom: none; }
    .wrong-q { font-size: 13px; color: #334155; font-weight: 600; line-height: 1.5; }
    .wrong-ans { font-size: 12px; color: #6366f1; margin-top: 3px; font-weight: 600; }
    .wrong-exp { font-size: 11px; color: #64748b; margin-top: 3px; line-height: 1.5; }

    .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .btn-retry { flex: 1; background: #6366f1; color: #fff; border: none; border-radius: 14px; padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-wrong { flex: 1; background: #fff; color: #ef4444; border: 1.5px solid #ef4444; border-radius: 14px; padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer; }

    /* 시작 화면 */
    #startView { padding: 32px 16px; text-align: center; }
    .start-card { background: #fff; border-radius: 20px; padding: 32px 20px; }
    .start-emoji { font-size: 56px; }
    .start-title { font-size: 22px; font-weight: 900; color: #0f172a; margin-top: 12px; margin-bottom: 6px; }
    .start-desc { font-size: 13px; color: #64748b; line-height: 1.7; margin-bottom: 24px; }
    .start-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .start-stat { background: #f8fafc; border-radius: 12px; padding: 12px 8px; }
    .start-stat-num { font-size: 22px; font-weight: 900; color: #6366f1; }
    .start-stat-label { font-size: 11px; color: #64748b; margin-top: 2px; }
    .mode-btns { display: flex; flex-direction: column; gap: 8px; }
    .mode-btn { padding: 14px; border-radius: 14px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; }
    .mode-btn-primary { background: #6366f1; color: #fff; }
    .mode-btn-secondary { background: #f1f5f9; color: #334155; }
  </style>
</head>
<body>
<div class="wrap">

  <!-- 시작 화면 -->
  <div id="startView">
    <div class="start-card">
      <div class="start-emoji">📚</div>
      <div class="start-title">ISTQB 문제 모음집</div>
      <div class="start-desc">CTFL 전 범위 101문제<br>한 문제씩 풀고 해설로 확인해요</div>
      <div class="start-stats">
        <div class="start-stat">
          <div class="start-stat-num">101</div>
          <div class="start-stat-label">전체 문제</div>
        </div>
        <div class="start-stat">
          <div class="start-stat-num">6</div>
          <div class="start-stat-label">챕터</div>
        </div>
        <div class="start-stat">
          <div class="start-stat-num">30</div>
          <div class="start-stat-label">Day</div>
        </div>
      </div>
      <div class="mode-btns">
        <button class="mode-btn mode-btn-primary" onclick="startQuiz('all')">🎲 전체 랜덤으로 풀기</button>
        <button class="mode-btn mode-btn-secondary" onclick="startQuiz('wrong')" id="wrongOnlyBtn" style="display:none">❌ 틀린 문제만 다시 풀기</button>
      </div>
    </div>
  </div>

  <!-- 퀴즈 화면 -->
  <div id="quizView" style="display:none">
    <div class="header">
      <div class="header-top">
        <div class="header-title">📚 문제 모음집</div>
        <div class="header-count" id="qCounter">1 / 101</div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar" style="width:1%"></div>
      </div>
      <div class="stats-row">
        <div class="stat stat-o">✅ <span id="statO">0</span></div>
        <div class="stat stat-x">❌ <span id="statX">0</span></div>
        <div class="stat stat-left">남은 문제 <span id="statLeft">101</span></div>
      </div>
    </div>

    <div class="body">
      <span class="chapter-tag" id="chapterTag"></span>
      <div class="question-card">
        <div class="question-num" id="questionNum"></div>
        <div class="question-text" id="questionText"></div>
      </div>
      <div id="optList"></div>
      <div class="explanation" id="explanation">
        <div class="exp-header">
          <span class="exp-result" id="expResult"></span>
          <span class="exp-correct-ans" id="expCorrectAns" style="display:none"></span>
        </div>
        <div class="exp-divider"></div>
        <div class="exp-label">💡 해설</div>
        <div class="exp-text" id="expText"></div>
      </div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 →</button>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="resultView">
    <div class="result-card">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-pct" id="resultPct"></div>
      <span class="grade-badge" id="gradeBadge"></span>
    </div>

    <div class="btn-row">
      <button class="btn-retry" onclick="goStart()">🔄 처음부터</button>
      <button class="btn-wrong" onclick="startQuiz('wrong')" id="wrongBtn">❌ 틀린 것만</button>
    </div>

    <div class="wrong-section" id="wrongSection">
      <div class="wrong-title">❌ 틀린 문제 모아보기</div>
      <div id="wrongList"></div>
    </div>
  </div>

</div>

<script>
  const CH_INFO = {
    "1장": { label: "1장 테스팅의 기초", color: "#6366f1" },
    "2장": { label: "2장 SDLC",         color: "#0ea5e9" },
    "3장": { label: "3장 정적 테스팅",  color: "#10b981" },
    "4장": { label: "4장 테스트 기법",  color: "#f59e0b" },
    "5장": { label: "5장 테스트 관리",  color: "#ef4444" },
    "6장": { label: "6장 도구/최종",    color: "#8b5cf6" },
  };
  const DAY_TO_CH = {
    1:"1장",2:"1장",3:"1장",4:"1장",5:"1장",6:"1장",7:"1장",
    8:"2장",9:"2장",10:"2장",11:"2장",12:"2장",13:"2장",14:"2장",
    15:"3장",16:"3장",17:"3장",
    18:"4장",19:"4장",20:"4장",21:"4장",22:"4장",
    23:"5장",24:"5장",25:"5장",26:"5장",27:"5장",28:"5장",
    29:"6장",30:"6장",
  };
  const NUM = ["①","②","③","④"];

  const ALL_QUESTIONS = [
    {day:1,q:"소프트웨어 테스팅에 대한 설명으로 올바른 것은?",opts:["소프트웨어를 실행하여 결과를 확인하는 활동만을 의미한다","결함을 식별하고 소프트웨어 산출물의 품질을 평가하는 일련의 활동이다","테스팅은 항상 소프트웨어를 실행해야 한다","테스팅은 베리피케이션에만 초점을 맞춘다"],ans:1,exp:"테스팅은 단순 실행이 아닌 계획·분석·설계·구현·실행·완료 등 다양한 활동을 포함합니다. 정적 테스팅처럼 실행 없이도 수행됩니다."},
    {day:1,q:"밸리데이션(Validation)에 대한 설명으로 옳은 것은?",opts:["시스템이 주어진 명세 요구사항을 충족하는지 확인","시스템이 사용자의 실제 필요를 만족하는지 확인","코드에서 결함을 직접 찾아내는 활동","테스트 결과를 기록하는 활동"],ans:1,exp:"밸리데이션은 '제대로 된 걸 만들었나?'를 확인합니다. 베리피케이션이 명세 충족 여부라면, 밸리데이션은 사용자 실제 요구 충족 여부입니다."},
    {day:1,q:"동적 테스팅과 정적 테스팅의 차이로 옳은 것은?",opts:["동적 테스팅은 소프트웨어를 실행하지 않고 정적 테스팅은 실행한다","동적 테스팅은 소프트웨어를 실행하고 정적 테스팅은 실행하지 않는다","둘 다 소프트웨어를 실행한다","둘 다 소프트웨어를 실행하지 않는다"],ans:1,exp:"동적 테스팅은 소프트웨어를 실행하여 장애를 유발합니다. 정적 테스팅(리뷰, 정적 분석)은 실행 없이 결함을 직접 식별합니다."},
    {day:1,q:"테스팅으로 할 수 없는 것은?",opts:["결함의 존재를 드러내는 것","소프트웨어 품질에 대한 자신감 제공","소프트웨어에 결함이 없음을 증명","리스크 수준을 낮추는 것"],ans:2,exp:"테스팅의 원리 1번: 테스팅은 결함의 존재를 밝히는 것이지, 결함이 없음을 증명하지 않습니다. 테스팅 후에도 잔존 결함이 있을 수 있습니다."},
    {day:1,q:"베리피케이션(Verification)의 핵심 질문은?",opts:["제대로 된 것을 만들었나?","제대로 만들었나?","사용자가 원하는 것인가?","비즈니스 가치가 있는가?"],ans:1,exp:"베리피케이션은 '제대로 만들었나?(Are we building the product right?)'입니다. 즉, 명세·설계서대로 구현됐는지 확인합니다."},
    {day:2,q:"테스팅과 디버깅의 관계로 옳은 것은?",opts:["테스팅과 디버깅은 같은 활동이다","테스팅은 결함을 식별하고 디버깅은 결함의 원인을 찾아 제거한다","디버깅이 테스팅보다 먼저 수행된다","테스터가 디버깅도 담당해야 한다"],ans:1,exp:"테스팅과 디버깅은 별개의 활동입니다. 테스팅은 테스터가 결함을 발견하고, 디버깅은 개발자가 원인을 분석하여 수정합니다."},
    {day:2,q:"일반적인 디버깅 프로세스의 순서로 올바른 것은?",opts:["분석 → 장애 재현 → 결함 수정","결함 수정 → 분석 → 장애 재현","장애 재현 → 분석(결함 찾기) → 결함 수정","결함 수정 → 장애 재현 → 분석"],ans:2,exp:"디버깅은 ①장애 재현 → ②원인 분석(결함 찾기) → ③결함 수정 순으로 진행됩니다. 재현이 안 되면 원인을 찾기 어렵습니다."},
    {day:2,q:"확인 테스팅(Confirmation Testing)의 목적은?",opts:["변경으로 인한 부정적 영향 확인","원래 결함이 성공적으로 수정됐는지 확인","새로운 기능이 추가됐는지 확인","성능이 개선됐는지 확인"],ans:1,exp:"확인 테스팅은 '이 버그 고쳤어?' 확인입니다. 결함 수정 직후 동일한 방법으로 재테스트하여 수정 여부를 검증합니다."},
    {day:2,q:"리그레션 테스팅이 자동화에 특히 적합한 이유는?",opts:["한 번만 실행되기 때문","반복적으로 실행되기 때문","복잡한 탐색적 사고가 필요하기 때문","새로운 기능만 테스트하기 때문"],ans:1,exp:"리그레션 테스팅은 변경이 생길 때마다 반복 실행됩니다. 같은 테스트를 계속 반복하므로 자동화하면 시간을 크게 절약할 수 있습니다."},
    {day:3,q:"오류(Error), 결함(Defect), 장애(Failure)의 관계를 올바르게 설명한 것은?",opts:["장애 → 결함 → 오류 순으로 발생한다","오류로 인해 결함이 발생하고 결함이 실행되면 장애로 이어질 수 있다","결함이 있으면 반드시 장애가 발생한다","장애는 항상 사람의 오류로만 발생한다"],ans:1,exp:"인과관계: 오류(사람의 실수) → 결함(코드의 버그) → 장애(실행 시 나타나는 증상). 결함이 있어도 해당 코드가 실행되지 않으면 장애가 안 날 수 있습니다."},
    {day:3,q:"결함이 있어도 장애가 발생하지 않는 경우로 옳은 것은?",opts:["결함이 매우 작은 경우","결함이 있는 코드가 실행되지 않은 경우","테스터가 찾지 못한 경우","개발자가 수정하지 않은 경우"],ans:1,exp:"결함(Defect)은 코드에 존재하지만, 그 코드가 실행되지 않으면 장애(Failure)로 이어지지 않습니다. 특정 입력 조건이 맞지 않으면 결함이 활성화되지 않을 수도 있습니다."},
    {day:3,q:"품질 보증(QA)과 테스팅의 차이에 대한 설명으로 옳은 것은?",opts:["QA와 테스팅은 동일한 개념이다","QA는 제품 지향적이고 테스팅은 프로세스 지향적이다","테스팅은 제품 지향적 교정 접근법이고 QA는 프로세스 중심의 예방 접근법이다","QA는 테스팅팀만의 책임이다"],ans:2,exp:"테스팅은 제품(소프트웨어)에 초점을 맞추어 결함을 발견합니다(교정). QA는 개발 프로세스를 개선하여 결함이 생기지 않도록 예방합니다(예방)."},
    {day:3,q:"근본원인(Root Cause) 분석의 목적은?",opts:["결함의 수를 세는 것","오류가 발생한 근본적인 이유를 파악하여 프로세스를 개선하는 것","모든 결함을 수정하는 것","테스터를 평가하는 것"],ans:1,exp:"근본원인 분석은 결함이 왜 생겼는지 근본 이유를 찾아 향후 같은 유형의 결함이 생기지 않도록 프로세스를 개선하는 데 활용됩니다."},
    {day:4,q:"테스팅의 7가지 원리 중 '살충제 패러독스'에 해당하는 것은?",opts:["완벽한 테스팅은 불가능하다","결함은 소수의 컴포넌트에 집중된다","같은 테스트를 반복하면 신규 결함 식별 효과가 줄어든다","테스팅은 결함의 존재를 밝히지 결함 없음을 증명하지 않는다"],ans:2,exp:"살충제 패러독스: 같은 테스트를 반복하면 새로운 결함을 발견하는 능력이 감소합니다. 테스트 케이스를 주기적으로 갱신해야 합니다."},
    {day:4,q:"'결함은 집중된다'는 원리와 관련된 개념은?",opts:["완벽한 테스팅 불가 원리","파레토 원리(80:20 법칙)","살충제 패러독스","정황 의존성"],ans:1,exp:"결함 집중 원리는 파레토 원리와 유사합니다. 대부분의 결함(약 80%)은 소수의 컴포넌트(약 20%)에 집중됩니다."},
    {day:4,q:"'결함-부재는 궤변이다'라는 원리가 의미하는 것은?",opts:["결함이 없으면 소프트웨어는 항상 성공적이다","모든 결함을 수정했더라도 사용자의 요구나 기대에 못 미치는 시스템이 될 수 있다","베리피케이션만으로 충분하다","결함을 찾지 못했으므로 결함이 없다"],ans:1,exp:"결함을 모두 수정해도 사용자가 원하지 않거나 사용하기 어렵다면 실패한 소프트웨어입니다. 밸리데이션이 중요한 이유입니다."},
    {day:4,q:"'조기 테스팅'의 이점이 아닌 것은?",opts:["결함을 일찍 발견할수록 수정 비용이 적다","정적 테스팅도 조기 테스팅의 일환이다","테스팅을 나중에 할수록 더 많은 결함을 발견한다","요구사항 단계부터 테스터가 참여할 수 있다"],ans:2,exp:"조기 테스팅(Shift Left) 원리: 결함은 일찍 발견할수록 수정 비용이 적습니다. 나중에 발견할수록 더 많은 재작업이 필요합니다."},
    {day:5,q:"테스트 분석 활동에서 도출하는 산출물은?",opts:["테스트 스크립트","테스트 컨디션","테스트 완료 보고서","테스트 로그"],ans:1,exp:"테스트 분석은 '무엇을 테스트할까?'를 결정하는 단계입니다. 테스트 베이시스를 분석하여 테스트 컨디션(테스트 조건)을 도출합니다."},
    {day:5,q:"테스트 프로세스에서 테스트 활동들의 수행 방식으로 옳은 것은?",opts:["항상 순차적으로 수행된다","반복적 또는 병렬로 구현되는 경우가 많다","항상 병렬로만 수행된다","한 번만 수행되고 반복하지 않는다"],ans:1,exp:"테스트 활동(계획→분석→설계→구현→실행→완료)은 SDLC에 따라 순차적일 수도, 반복적·병렬적으로 수행될 수도 있습니다."},
    {day:6,q:"추적성(Traceability)을 유지하는 주요 목적이 아닌 것은?",opts:["커버리지 평가 지원","변경사항의 영향 파악","테스트 케이스 자동 생성","테스트 감사 용이화"],ans:2,exp:"추적성의 이점: 커버리지 평가, 변경 영향 파악, 감사 지원, 이해관계자 소통. 테스트 케이스를 자동으로 생성하는 것은 추적성과 관계없습니다."},
    {day:6,q:"테스트웨어(Testware)에 해당하지 않는 것은?",opts:["테스트 케이스","테스트 데이터","소프트웨어 소스 코드","테스트 완료 보고서"],ans:2,exp:"테스트웨어는 테스트 활동의 결과로 생성된 산출물입니다. 소스 코드는 테스팅의 대상(테스트 오브젝트)이지 테스트웨어가 아닙니다."},
    {day:7,q:"테스팅 독립성이 가장 높은 수준은?",opts:["저자가 직접 테스트","같은 팀 동료가 테스트","조직 내 별도 테스트팀이 테스트","외부 조직(아웃소싱)이 테스트"],ans:3,exp:"독립성 수준: 저자 자신 < 같은 팀 동료 < 별도 테스트팀 < 외부 조직. 독립성이 높을수록 인지 편향 없이 결함을 더 잘 발견합니다."},
    {day:7,q:"전체 팀 접근법(Whole Team Approach)의 특징으로 옳지 않은 것은?",opts:["모든 팀원이 품질에 대한 책임을 진다","팀원들은 작업 공간을 공유한다","테스터만이 품질을 담당한다","비즈니스 담당자와 개발자, 테스터가 함께 일한다"],ans:2,exp:"전체 팀 접근법은 모든 팀원이 품질 책임을 공유합니다. 테스터만 품질을 담당한다는 개념은 전통적 방식이며, 전체 팀 접근법과 반대됩니다."},
    {day:8,q:"V-모델에서 요구사항 명세서에 대응하는 테스트 레벨은?",opts:["컴포넌트 테스팅","시스템 테스팅","인수 테스팅","컴포넌트 통합 테스팅"],ans:2,exp:"V-모델 대응: 요구사항 명세 ↔ 인수 테스팅 / 시스템 설계 ↔ 시스템 테스팅 / 아키텍처 설계 ↔ 통합 테스팅 / 상세 설계 ↔ 컴포넌트 테스팅."},
    {day:8,q:"SDLC 모델 선택이 테스팅에 영향을 미치는 요소가 아닌 것은?",opts:["테스트 활동의 범위와 시기","테스트 문서의 상세화 수준","테스터의 연봉 수준","테스트 자동화 범위"],ans:2,exp:"SDLC 모델은 테스트 범위·시기, 문서 수준, 기법·접근법, 자동화 범위, 테스터 역할에 영향을 줍니다. 테스터의 연봉은 조직 정책에 따릅니다."},
    {day:9,q:"TDD(테스트 주도 개발)에서 리팩토링(Refactoring)의 의미는?",opts:["새로운 기능을 추가하는 것","기능 변경 없이 코드 구조를 개선하는 것","테스트 케이스를 삭제하는 것","버그를 수정하는 것"],ans:1,exp:"TDD에서 ①테스트 작성 → ②코드 작성 → ③리팩토링 순서입니다. 리팩토링은 외부 동작(기능)을 변경하지 않고 내부 코드 구조를 깔끔하게 개선하는 것입니다."},
    {day:9,q:"BDD(행위 주도 개발)에서 사용하는 테스트 케이스 형식은?",opts:["If/Then/Else","Given/When/Then","When/Then/Because","Do/Verify/Check"],ans:1,exp:"BDD는 Given(사전조건)/When(행위)/Then(기대결과) 형식으로 테스트를 기술합니다. 개발자·테스터·비즈니스 담당자가 공통으로 이해할 수 있습니다."},
    {day:9,q:"ATDD, TDD, BDD의 공통점으로 옳은 것은?",opts:["모두 GUI 레벨 테스팅에 초점을 맞춘다","모두 코드 작성 전에 테스트를 정의한다","모두 수동 테스팅만 사용한다","모두 성능 테스팅에 사용된다"],ans:1,exp:"ATDD, TDD, BDD 모두 코드 작성 전에 테스트를 먼저 정의합니다. 조기 테스팅(Shift Left) 원리를 따르며, 작성된 테스트는 자동화 테스트로 유지됩니다."},
    {day:10,q:"시프트 레프트(Shift Left)에 대한 설명으로 옳지 않은 것은?",opts:["SDLC 초기에 테스트를 수행하는 접근법이다","SDLC 후반부의 테스트를 무시해도 된다","조기 테스팅 원리와 관련이 있다","명세 리뷰도 시프트 레프트의 프랙티스 중 하나다"],ans:1,exp:"시프트 레프트는 테스팅을 더 일찍 시작하는 것이지, 후반부 테스팅을 없애는 것이 아닙니다. 후반부 테스팅도 여전히 필요합니다."},
    {day:10,q:"DevOps의 테스팅 이점으로 옳지 않은 것은?",opts:["코드 품질에 대한 빠른 피드백 제공","자동 리그레션 테스트의 규모와 범위가 늘어남","반복적인 수동 테스팅의 필요성을 완전히 제거","안정적인 테스트 환경 구축 촉진"],ans:2,exp:"DevOps는 자동화를 확대하지만, 수동 테스팅을 완전히 제거하지는 않습니다. 탐색적 테스팅 등 복잡한 시나리오는 여전히 수동이 필요합니다."},
    {day:11,q:"다음 중 올바른 테스트 레벨의 순서는?",opts:["인수 → 시스템 → 컴포넌트 통합 → 컴포넌트","컴포넌트 → 컴포넌트 통합 → 시스템 → 인수","시스템 → 시스템 통합 → 컴포넌트 → 인수","인수 → 컴포넌트 → 시스템 통합 → 시스템"],ans:1,exp:"테스트 레벨 순서: 컴포넌트 → 컴포넌트 통합 → 시스템 → 시스템 통합 → 인수."},
    {day:11,q:"컴포넌트 통합 테스팅의 주요 목적은?",opts:["개별 컴포넌트의 기능 검증","컴포넌트 간의 인터페이스와 상호작용 검증","전체 시스템의 기능 검증","외부 시스템과의 연동 검증"],ans:1,exp:"컴포넌트 통합 테스팅은 컴포넌트들이 서로 올바르게 연동되는지 인터페이스 결함을 찾는 테스팅입니다."},
    {day:12,q:"기능 테스팅과 비기능 테스팅의 차이로 옳은 것은?",opts:["기능 테스팅은 얼마나 잘 동작하는지 확인, 비기능 테스팅은 무엇을 하는지 확인","기능 테스팅은 무엇을 하는지 확인, 비기능 테스팅은 얼마나 잘 동작하는지 확인","둘은 동일한 테스팅이다","비기능 테스팅이 기능 테스팅보다 항상 먼저 수행된다"],ans:1,exp:"기능 테스팅: '무엇을 하는가?' (기능 요구사항). 비기능 테스팅: '얼마나 잘 하는가?' (성능, 보안, 사용성 등 품질 특성)."},
    {day:12,q:"리그레션 테스팅의 자동화가 권장되는 이유는?",opts:["처음 실행 시 더 많은 결함을 찾기 때문","반복적으로 실행되므로 자동화 시 비용 대비 효과가 높기 때문","수동보다 항상 더 많은 결함을 찾기 때문","자동화가 테스터를 완전히 대체하기 때문"],ans:1,exp:"리그레션 테스팅은 변경이 생길 때마다 반복 실행됩니다. 한 번 자동화해두면 이후 실행 비용이 낮아져 ROI(투자 대비 효과)가 높습니다."},
    {day:13,q:"유지보수 테스팅의 계기에 해당하지 않는 것은?",opts:["긴급 핫픽스와 같은 수정사항","운영 환경의 업그레이드나 마이그레이션","최초 개발 및 릴리스","애플리케이션의 단종(Retirement)"],ans:2,exp:"유지보수 테스팅 계기: ①수정 ②업그레이드/마이그레이션 ③단종. 최초 개발은 유지보수 단계가 아닙니다."},
    {day:15,q:"정적 테스팅으로만 찾을 수 있는 결함 유형은?",opts:["성능 저하 문제","도달 불가능한 코드(Dead Code)","런타임 메모리 오류","응답 시간 초과"],ans:1,exp:"도달 불가능한 코드(Dead Code)는 실행되지 않으므로 동적 테스팅으로는 발견할 수 없습니다. 정적 분석 도구가 이를 탐지할 수 있습니다."},
    {day:15,q:"정적 분석(Static Analysis)에 대한 설명으로 옳은 것은?",opts:["반드시 사람이 직접 수행해야 한다","도구를 사용하여 소프트웨어를 실행하지 않고 자동으로 코드를 분석한다","테스트 케이스가 반드시 필요하다","동적 테스팅의 한 유형이다"],ans:1,exp:"정적 분석은 도구를 활용하여 소프트웨어를 실행하지 않고 코드를 자동 분석합니다. CI/CD 파이프라인에 통합하여 자동화할 수 있습니다."},
    {day:15,q:"정적 테스팅이 적용될 수 있는 작업 산출물이 아닌 것은?",opts:["요구사항 명세서","소스 코드","시스템 실행 로그 분석","테스트 케이스"],ans:2,exp:"정적 테스팅은 요구사항, 설계서, 코드, 테스트케이스, 계획서 등에 적용됩니다. 시스템 실행 로그는 소프트웨어를 실행한 후의 결과물이라 정적 테스팅 대상이 아닙니다."},
    {day:16,q:"리뷰 프로세스의 올바른 순서는?",opts:["계획 → 개별 리뷰 → 리뷰 착수 → 논의/분석 → 수정/보고","계획 → 리뷰 착수 → 개별 리뷰 → 논의/분석 → 수정/보고","리뷰 착수 → 계획 → 개별 리뷰 → 수정/보고 → 논의/분석","개별 리뷰 → 계획 → 리뷰 착수 → 논의/분석 → 수정/보고"],ans:1,exp:"순서: ①계획 → ②리뷰 착수 → ③개별 리뷰 → ④논의/분석 → ⑤수정/보고. 핵심은 '개별 리뷰'가 '논의/분석' 전에 온다는 것입니다."},
    {day:16,q:"리뷰에서 중재자(퍼실리테이터)의 역할로 옳은 것은?",opts:["리뷰 대상 산출물을 수정한다","리뷰 회의를 진행하고 안전한 분위기를 조성한다","이상 사항을 수집하여 기록한다","리뷰 예산을 결정한다"],ans:1,exp:"중재자(퍼실리테이터)는 리뷰 회의를 효율적으로 진행하고, 참여자들이 자유롭게 의견을 낼 수 있는 안전한 분위기를 만드는 역할입니다."},
    {day:17,q:"가장 공식적인 리뷰 유형은?",opts:["비공식 리뷰","워크쓰루","기술 리뷰","인스펙션"],ans:3,exp:"공식성 순서: 비공식 리뷰 < 워크쓰루 < 기술 리뷰 < 인스펙션. 인스펙션은 가장 공식적이고 체계적이며, 메트릭도 수집합니다."},
    {day:17,q:"인스펙션(Inspection)에서 저자의 역할 제한으로 옳은 것은?",opts:["저자는 리뷰어가 될 수 없다","저자는 리뷰 리더나 서기가 될 수 없다","저자는 수정 활동에 참여할 수 없다","저자는 인스펙션에 참여할 수 없다"],ans:1,exp:"인스펙션에서 저자는 리더나 서기 역할을 할 수 없습니다. 객관성을 확보하기 위한 것이며, 저자는 결함 설명을 위해 참여는 할 수 있습니다."},
    {day:17,q:"리뷰의 성공을 위한 요소로 옳지 않은 것은?",opts:["명확한 목표 정의","리뷰어에게 충분한 준비 시간 제공","리뷰를 통해 저자를 평가하는 문화 조성","관리자의 지원"],ans:2,exp:"리뷰는 사람이 아닌 산출물의 품질에 초점을 맞춰야 합니다. 저자를 평가·비난하는 문화는 리뷰의 가장 큰 실패 원인 중 하나입니다."},
    {day:18,q:"나이 입력 필드(유효 범위: 1~120)에서 비유효 분할은?",opts:["1~120","50, 75, 100 등 중간값","0 이하 또는 121 이상","1과 120"],ans:2,exp:"유효 분할: 1~120. 비유효 분할: 0 이하(음수, 0)와 121 이상(초과값). 각 분할에서 대표값을 하나씩 선택해 테스트합니다."},
    {day:18,q:"2값 경계값 분석에서 범위 1~10의 테스트 값으로 옳은 것은?",opts:["1, 5, 10","0, 1, 10, 11","0, 1, 5, 10, 11","1, 2, 9, 10"],ans:1,exp:"2값 BVA: 각 경계값과 바로 인접한 값. 하한: 0(경계 아래), 1(경계). 상한: 10(경계), 11(경계 위). 총 4개 값: 0, 1, 10, 11."},
    {day:18,q:"3값 경계값 분석이 2값보다 더 엄격한 이유는?",opts:["더 많은 테스트 케이스를 생성하기 때문","경계값과 그 양쪽 이웃값을 모두 테스트하기 때문","유효 분할만 테스트하기 때문","자동화가 더 쉽기 때문"],ans:1,exp:"3값 BVA는 경계값과 바로 위아래 이웃값 모두를 테스트합니다. 잘못 배치된 경계(예: <=10이 아닌 <10으로 구현)를 발견할 수 있어 더 엄격합니다."},
    {day:19,q:"결정 테이블에서 '–' 기호의 의미는?",opts:["조건이 참(True)임을 의미한다","해당 조건 값이 결과에 영향이 없음을 의미한다","조건이 거짓(False)임을 의미한다","조건이 실행 불가능함을 의미한다"],ans:1,exp:"결정 테이블에서 '–'는 해당 조건이 무관(Don't Care)을 의미합니다. 즉, 그 조건의 값(참/거짓)이 결과에 영향을 주지 않습니다."},
    {day:19,q:"상태 전이 테스팅에서 가장 많이 사용되는 커버리지 기준은?",opts:["모든 상태 커버리지","유효 전이 커버리지(0-스위치)","모든 전이 커버리지(비유효 포함)","N-스위치 커버리지"],ans:1,exp:"유효 전이 커버리지(0-스위치)는 모든 유효한 전이를 최소 한 번 실행하는 기준으로, 가장 널리 사용됩니다."},
    {day:19,q:"상태 전이 테스팅에서 비유효 전이를 테스트하는 이유는?",opts:["더 빠른 시스템을 만들기 위해","잘못된 입력이나 이벤트에 대한 시스템의 처리를 검증하기 위해","테스트 케이스 수를 늘리기 위해","성능을 개선하기 위해"],ans:1,exp:"비유효 전이는 허용되지 않는 전이에 대한 테스트입니다. 시스템이 잘못된 입력에 대해 올바르게 거부/오류 처리하는지 확인합니다."},
    {day:20,q:"100% 분기 커버리지를 달성하면 자동으로 달성되는 것은?",opts:["경로 커버리지","구문 커버리지","조건 커버리지","MC/DC 커버리지"],ans:1,exp:"분기 커버리지 100% → 구문 커버리지 100% 자동 보장. 모든 분기(참/거짓)를 실행했다면 모든 구문도 실행됐기 때문입니다. 반대는 성립하지 않습니다."},
    {day:20,q:"화이트박스 테스팅의 한계로 옳은 것은?",opts:["명세 기반으로 테스트하므로 내부 구조를 알 수 없다","구현되지 않은 요구사항의 누락 결함을 식별하지 못한다","동적 테스팅에 사용할 수 없다","정량적 커버리지 측정이 불가능하다"],ans:1,exp:"화이트박스는 구현된 코드 기반이므로, 코드에 없는 기능(구현되지 않은 요구사항)의 누락 결함은 발견할 수 없습니다."},
    {day:21,q:"탐색적 테스팅에서 테스트 차터(Charter)의 역할은?",opts:["테스트 케이스를 상세하게 문서화한다","테스트 목적이 정의된 테스팅 지침으로 사용된다","자동화 스크립트를 생성하는 도구다","결함 보고 양식이다"],ans:1,exp:"테스트 차터는 탐색적 테스팅에서 '무엇을 탐색할지, 어떻게 할지, 무엇을 찾을지'를 정의한 지침입니다."},
    {day:21,q:"오류 추정(Error Guessing)의 근거가 되는 지식으로 옳지 않은 것은?",opts:["과거 애플리케이션의 동작 이력","개발자가 범하기 쉬운 오류 유형","다른 유사 애플리케이션의 장애 유형","테스트 자동화 도구의 종류"],ans:3,exp:"오류 추정은 테스터의 경험과 직관을 활용합니다. 지식 출처: 과거 이력, 개발자 오류 유형, 유사 앱 장애 유형 등. 자동화 도구 종류는 관련 없습니다."},
    {day:22,q:"좋은 사용자 스토리의 INVEST 기준 중 'V'는?",opts:["Verifiable(검증 가능한)","Valuable(사용자/비즈니스에 가치 있는)","Variable(변경 가능한)","Visible(가시적인)"],ans:1,exp:"INVEST: Independent, Negotiable, Valuable(가치있음), Estimable, Small, Testable. 'V'는 비즈니스/사용자에게 가치가 있어야 함입니다."},
    {day:22,q:"사용자 스토리의 3C에서 'Confirmation'은?",opts:["사용자 스토리를 기록하는 매체(카드)","소프트웨어 사용 방법에 대한 대화","인수 조건 — 스토리가 완료됐는지 확인하는 기준","사용자 스토리의 우선순위"],ans:2,exp:"3C: Card(기록 매체), Conversation(대화), Confirmation(확인=인수 조건). Confirmation이 바로 인수 조건이며, 스토리 완료 판단 기준입니다."},
    {day:23,q:"애자일에서 완료 조건을 지칭하는 용어는?",opts:["준비의 정의(Definition of Ready)","완료의 정의(Definition of Done)","수락의 정의","릴리스의 정의"],ans:1,exp:"애자일에서 '완료의 정의(DoD)'는 테스트 완료 조건에 해당합니다. 스프린트 항목이 '완료됐다'고 할 수 있는 기준을 팀이 합의하여 정의합니다."},
    {day:23,q:"테스트 계획서에 포함되는 내용이 아닌 것은?",opts:["테스팅 범위와 목적","테스트 접근법과 기법","각 결함의 상세 수정 내역","리스크 목록과 예산/일정"],ans:2,exp:"테스트 계획서는 계획 단계의 산출물입니다. 각 결함의 상세 수정 내역은 결함 보고서와 확인 테스팅 결과에 포함되는 내용입니다."},
    {day:24,q:"3점 추정에서 최종 추정치(E) 계산 공식은?",opts:["E = (a + m + b) / 3","E = (a + 4m + b) / 6","E = (a + 2m + b) / 4","E = (최솟값 + 최댓값) / 2"],ans:1,exp:"3점 추정 공식: E = (a + 4m + b) / 6. a=낙관, m=확률(Most Likely), b=비관. 확률적 추정에 가장 높은 가중치(4)를 줍니다."},
    {day:24,q:"플래닝 포커(Planning Poker)는 어떤 추정 기법의 변형인가?",opts:["비율 기반 추정","외삽법","와이드밴드 델파이","3점 추정"],ans:2,exp:"와이드밴드 델파이는 전문가들이 독립적으로 추정 후 토론·재추정을 반복합니다. 플래닝 포커는 이 방법의 애자일 변형으로 카드를 사용합니다."},
    {day:25,q:"테스트 피라미드에서 상층(E2E/UI 테스트)의 특징은?",opts:["작고 빠르며 많은 수가 필요하다","복잡하고 느리며 적은 수로 충분하다","반드시 수동으로 수행해야 한다","비기능 테스트만 포함한다"],ans:1,exp:"피라미드 상층(E2E/UI): 느리고 복잡하여 적은 수 유지. 하층(단위): 빠르고 작아서 많은 수 유지. 상층으로 갈수록 실행 비용이 높아집니다."},
    {day:25,q:"테스팅 사분면 Q4에 해당하는 테스트 유형은?",opts:["탐색적 테스팅, UAT","기능 테스팅, 사용자 스토리 테스팅","컴포넌트 테스트, 통합 테스트(자동화)","스모크 테스트, 성능 테스트, 보안 테스트"],ans:3,exp:"Q4는 기술 측면 + 제품 평가: 성능, 보안, 스모크 테스트 등. Q1=기술/팀지원, Q2=비즈니스/팀지원, Q3=비즈니스/제품평가, Q4=기술/제품평가."},
    {day:26,q:"리스크 수준(Risk Level)을 계산하는 방법은?",opts:["리스크 발생 가능성 + 리스크 영향","리스크 발생 가능성 × 리스크 영향","리스크 영향 / 리스크 발생 가능성","리스크 발생 가능성 - 리스크 영향"],ans:1,exp:"리스크 수준 = 발생 가능성 × 영향도. 발생 가능성이 낮아도 영향이 크거나, 반대의 경우도 리스크 수준이 높을 수 있습니다."},
    {day:26,q:"제품 리스크와 프로젝트 리스크의 구분으로 옳은 것은?",opts:["제품 리스크는 일정 지연, 프로젝트 리스크는 보안 취약점","제품 리스크는 소프트웨어 품질에 영향, 프로젝트 리스크는 프로젝트 목표 달성에 영향","두 리스크는 동일하다","프로젝트 리스크가 항상 더 심각하다"],ans:1,exp:"제품 리스크: 소프트웨어 품질에 영향(보안 취약점, 누락 기능 등). 프로젝트 리스크: 프로젝트 목표에 영향(납기 지연, 예산 초과 등)."},
    {day:26,q:"리스크 기반 테스팅의 접근법으로 옳은 것은?",opts:["리스크가 낮은 영역을 먼저 테스트한다","리스크 수준이 높은 영역을 먼저, 더 많이 테스트한다","모든 영역을 동등하게 테스트한다","리스크와 무관하게 랜덤으로 순서를 정한다"],ans:1,exp:"리스크 기반 테스팅은 리스크 수준이 높은 영역에 테스트 자원을 집중합니다. 제한된 시간 내에 중요한 결함을 먼저 발견하도록 우선순위를 정합니다."},
    {day:27,q:"테스트 모니터링의 주요 목적은?",opts:["테스트 케이스를 자동 생성하는 것","테스팅 정보를 수집하여 진행 상황과 완료 조건 충족 여부를 평가하는 것","결함을 수정하는 것","테스트 환경을 설정하는 것"],ans:1,exp:"테스트 모니터링은 현재 진행 상황에 대한 정보를 지속적으로 수집하고 비교합니다. 모니터링 결과를 바탕으로 제어(조치) 활동을 결정합니다."},
    {day:27,q:"테스트 완료 보고서에 포함되면 안 되는 항목은?",opts:["테스트 요약","테스팅 방해 요소와 대응 방법","다음 반복 주기의 상세 테스트 케이스 목록","완화되지 않은 리스크와 수정되지 않은 결함"],ans:2,exp:"테스트 완료 보고서는 완료된 테스팅을 요약하는 문서입니다. 다음 주기의 테스트 케이스는 미래 계획으로, 완료 보고서가 아닙니다."},
    {day:28,q:"결함 보고서에 반드시 포함되어야 할 내용이 아닌 것은?",opts:["고유 식별자와 제목","기대 결과와 실제 결과","결함을 수정한 개발자의 이름","결함의 심각도와 수정 우선순위"],ans:2,exp:"결함 보고서 필수 항목: 식별자, 제목, 날짜, 환경, 재현 절차, 기대/실제 결과, 심각도, 우선순위, 상태. 수정한 개발자 이름은 필수가 아닙니다."},
    {day:28,q:"형상 관리에서 베이스라인(Baseline)에 대한 설명으로 옳은 것은?",opts:["공식적인 변경 제어 없이도 수정 가능하다","형상 항목이 테스팅용으로 승인된 상태를 의미한다","개발 초기 단계에서만 설정된다","테스트 케이스만 포함한다"],ans:1,exp:"베이스라인은 형상 항목이 공식적으로 승인된 상태입니다. 이후 변경은 반드시 공식적인 변경 제어 프로세스를 거쳐야 합니다."},
    {day:28,q:"결함 심각도(Severity)와 수정 우선순위(Priority)의 관계로 옳은 것은?",opts:["항상 심각도가 높으면 우선순위도 높다","심각도와 우선순위는 독립적일 수 있다","우선순위가 높으면 항상 심각도도 높다","심각도와 우선순위는 항상 동일하다"],ans:1,exp:"심각도(Severity)는 기술적 영향도, 우선순위(Priority)는 비즈니스적 수정 순서입니다. 오탈자처럼 사소해도 홈페이지 메인이면 우선순위가 높을 수 있습니다."},
    {day:29,q:"테스트 자동화의 효과로 옳은 것은?",opts:["모든 결함을 자동으로 발견한다","반복적 수작업을 줄여 시간을 절약하고 일관성 및 재현성을 향상시킨다","수동 테스팅이 완전히 불필요해진다","코드 품질이 자동으로 향상된다"],ans:1,exp:"자동화 효과: 시간 절약, 일관성/재현성, 객관적 평가, 정보 접근성, 실행 시간 단축, 창의적 작업 집중. 모든 결함 발견이나 수동 테스팅 완전 대체는 불가능합니다."},
    {day:29,q:"테스트 자동화의 잠재적 리스크로 옳지 않은 것은?",opts:["도구 효과에 대한 비현실적인 기대","도구에 지나치게 의존하여 비판적 사고 무시","반복적 수작업 감소로 인한 시간 절약","오픈소스 소프트웨어의 지원 중단 가능성"],ans:2,exp:"반복적 수작업 감소는 자동화의 '효과'이지 '리스크'가 아닙니다. 리스크: 비현실적 기대, 비판적 사고 무시, 초기 투자 비용, 지원 중단 가능성 등."},
    {day:30,q:"블랙박스 테스트 기법에 해당하지 않는 것은?",opts:["동등 분할","경계값 분석","구문 테스팅","결정 테이블 테스팅"],ans:2,exp:"블랙박스 기법: 동등 분할, 경계값 분석, 결정 테이블, 상태 전이 등. 구문 테스팅은 코드 내부 구조 기반의 화이트박스 기법입니다."},
    {day:30,q:"4가지 리뷰 유형을 공식성이 낮은 순서에서 높은 순서로 나열한 것은?",opts:["인스펙션 > 기술 리뷰 > 워크쓰루 > 비공식 리뷰","비공식 리뷰 > 워크쓰루 > 기술 리뷰 > 인스펙션","기술 리뷰 > 인스펙션 > 워크쓰루 > 비공식 리뷰","워크쓰루 > 비공식 리뷰 > 기술 리뷰 > 인스펙션"],ans:1,exp:"공식성 낮음→높음: 비공식 리뷰 < 워크쓰루 < 기술 리뷰 < 인스펙션."},
    {day:30,q:"경험 기반 테스트 기법이 아닌 것은?",opts:["오류 추정","탐색적 테스팅","체크리스트 기반 테스팅","구문 테스팅"],ans:3,exp:"경험 기반 기법: 오류 추정, 탐색적 테스팅, 체크리스트 기반 테스팅. 구문 테스팅은 코드 내부 구조 기반의 화이트박스(구조 기반) 기법입니다."},
    {day:30,q:"ISTQB CTFL에서 정의한 테스트 레벨의 수는?",opts:["3가지","4가지","5가지","6가지"],ans:2,exp:"5가지 테스트 레벨: 컴포넌트 테스팅, 컴포넌트 통합 테스팅, 시스템 테스팅, 시스템 통합 테스팅, 인수 테스팅."},
  ];

  let quizList = [], currentQ = 0, selected = null, answers = [];
  let wrongQuestions = [];

  function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

  function startQuiz(mode) {
    document.getElementById('startView').style.display = 'none';
    document.getElementById('resultView').style.display = 'none';
    document.getElementById('quizView').style.display = 'block';

    quizList = mode === 'wrong' && wrongQuestions.length > 0
      ? shuffle(wrongQuestions)
      : shuffle(ALL_QUESTIONS);
    currentQ = 0; selected = null; answers = [];
    renderQuestion();
  }

  function renderQuestion() {
    const q = quizList[currentQ];
    const ch = DAY_TO_CH[q.day];
    const info = CH_INFO[ch];
    const total = quizList.length;
    const correct = answers.filter(a => a.ok).length;
    const wrong = answers.filter(a => !a.ok).length;

    document.getElementById('qCounter').textContent = `${currentQ + 1} / ${total}`;
    document.getElementById('progressBar').style.width = `${((currentQ) / total) * 100}%`;
    document.getElementById('statO').textContent = correct;
    document.getElementById('statX').textContent = wrong;
    document.getElementById('statLeft').textContent = total - currentQ;

    const tag = document.getElementById('chapterTag');
    tag.textContent = `${info.label} · Day ${q.day}`;
    tag.style.background = info.color + '18';
    tag.style.color = info.color;

    document.getElementById('questionNum').textContent = `문제 ${currentQ + 1}`;
    document.getElementById('questionText').textContent = q.q;

    document.getElementById('optList').innerHTML = q.opts.map((opt, i) => `
      <div class="opt" id="opt${i}" onclick="handleAnswer(${i})">
        <span class="opt-num">${NUM[i]}</span>
        <span>${opt}</span>
        <span class="opt-mark" id="mark${i}"></span>
      </div>`).join('');

    document.getElementById('explanation').className = 'explanation';
    document.getElementById('nextBtn').className = 'next-btn';
    selected = null;
  }

  function handleAnswer(idx) {
    if (selected !== null) return;
    selected = idx;
    const q = quizList[currentQ];
    const isCorrect = idx === q.ans;

    for (let i = 0; i < q.opts.length; i++) {
      const el = document.getElementById(`opt${i}`);
      el.classList.add('disabled');
      if (i === q.ans) { el.classList.add('correct'); document.getElementById(`mark${i}`).textContent = '✓'; }
      else if (i === idx && !isCorrect) { el.classList.add('wrong'); document.getElementById(`mark${i}`).textContent = '✗'; }
    }

    const expEl = document.getElementById('explanation');
    expEl.className = `explanation show ${isCorrect ? 'ok' : 'ng'}`;
    document.getElementById('expResult').textContent = isCorrect ? '🎉 정답!' : '❌ 오답';
    const correctAnsEl = document.getElementById('expCorrectAns');
    if (!isCorrect) {
      correctAnsEl.textContent = `정답: ${NUM[q.ans]} ${q.opts[q.ans]}`;
      correctAnsEl.style.display = 'inline-block';
    } else {
      correctAnsEl.style.display = 'none';
    }
    document.getElementById('expText').textContent = q.exp || '';

    const nextBtn = document.getElementById('nextBtn');
    nextBtn.className = 'next-btn show';
    nextBtn.textContent = currentQ + 1 >= quizList.length ? '결과 보기 →' : '다음 문제 →';
  }

  function nextQuestion() {
    const q = quizList[currentQ];
    const ok = selected === q.ans;
    answers.push({ q, selected, ok });
    if (!ok) wrongQuestions = wrongQuestions.filter(w => w.q !== q.q);
    if (!ok) wrongQuestions.push(q);

    if (currentQ + 1 >= quizList.length) showResult();
    else { currentQ++; renderQuestion(); }
  }

  function showResult() {
    document.getElementById('quizView').style.display = 'none';
    document.getElementById('resultView').style.display = 'block';

    const score = answers.filter(a => a.ok).length;
    const total = answers.length;
    const pct = Math.round((score / total) * 100);
    const grade = pct >= 80 ? '합격권 🎯' : pct >= 60 ? '조금 더 화이팅! 💪' : '복습이 필요해요 📖';
    const gcol = pct >= 80 ? '#22c55e' : pct >= 60 ? '#f59e0b' : '#ef4444';

    document.getElementById('resultEmoji').textContent = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : '📚';
    document.getElementById('resultTitle').textContent = '풀이 완료!';
    document.getElementById('resultScore').innerHTML = `${score}<span>/${total}</span>`;
    document.getElementById('resultScore').style.color = gcol;
    document.getElementById('resultPct').textContent = `정답률 ${pct}%`;
    const badge = document.getElementById('gradeBadge');
    badge.textContent = grade; badge.style.background = gcol + '20'; badge.style.color = gcol;

    const wrongOnly = answers.filter(a => !a.ok);
    const wrongBtn = document.getElementById('wrongBtn');
    if (wrongOnly.length > 0) {
      wrongBtn.style.display = 'block';
      wrongBtn.textContent = `❌ 틀린 ${wrongOnly.length}문제만`;
    } else {
      wrongBtn.style.display = 'none';
    }

    document.getElementById('wrongList').innerHTML = wrongOnly.length === 0
      ? '<div style="text-align:center;color:#10b981;font-weight:700;padding:16px">🎉 모두 정답!</div>'
      : wrongOnly.map((a, i) => `
        <div class="wrong-item">
          <div class="wrong-q">Q. ${a.q.q}</div>
          <div class="wrong-ans">✅ 정답: ${NUM[a.q.ans]} ${a.q.opts[a.q.ans]}</div>
          <div class="wrong-exp">${a.q.exp}</div>
        </div>`).join('');
  }

  function goStart() {
    document.getElementById('resultView').style.display = 'none';
    document.getElementById('startView').style.display = 'block';
    if (wrongQuestions.length > 0) {
      document.getElementById('wrongOnlyBtn').style.display = 'block';
    }
  }

  // 시작화면 초기화
  document.getElementById('startView').style.display = 'block';
</script>
</body>
