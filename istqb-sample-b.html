<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISTQB 샘플문제 B 퀴즈</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #252838;
    --border: #2e3247;
    --accent: #6c8cff;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e2e8f0;
    --muted: #8892a4;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 60px;
  }

  header {
    width: 100%;
    max-width: 720px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: .08em;
    font-weight: 700;
  }
  .score-area {
    display: flex;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .score-ok { color: var(--green); }
  .score-ng { color: var(--red); }
  .score-tot { color: var(--muted); }

  /* 진행 도트 */
  .dots-wrap {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 20px;
  }
  .dot {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .15s;
  }
  .dot:hover { border-color: var(--accent); color: var(--accent); }
  .dot.answered-ok { background: rgba(52,211,153,.15); border-color: var(--green); color: var(--green); }
  .dot.answered-ng { background: rgba(248,113,113,.15); border-color: var(--red); color: var(--red); }
  .dot.current { border-color: var(--accent); color: var(--accent); background: rgba(108,140,255,.12); }

  /* 메인 카드 */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 26px;
    width: 100%;
    max-width: 720px;
    margin-bottom: 14px;
  }
  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .q-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(108,140,255,.12);
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 700;
    letter-spacing: .06em;
  }
  .q-lo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .q-k {
    font-size: 11px;
    color: var(--yellow);
    background: rgba(251,191,36,.1);
    padding: 2px 7px;
    border-radius: 5px;
  }

  .q-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    font-weight: 500;
    margin-bottom: 8px;
  }
  .q-sub {
    font-size: 13px;
    color: var(--muted);
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 18px;
    line-height: 1.65;
  }
  .multi-badge {
    display: inline-block;
    font-size: 11px;
    color: var(--yellow);
    border: 1px solid rgba(251,191,36,.3);
    padding: 2px 8px;
    border-radius: 5px;
    margin-bottom: 14px;
  }

  /* 선택지 */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    background: transparent;
    text-align: left;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    width: 100%;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: rgba(108,140,255,.06); }
  .opt .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    min-width: 18px;
    padding-top: 1px;
  }
  .opt.selected { border-color: var(--accent2); background: rgba(167,139,250,.1); }
  .opt.selected .label { color: var(--accent2); }
  .opt.correct { border-color: var(--green); background: rgba(52,211,153,.1); }
  .opt.correct .label { color: var(--green); }
  .opt.wrong { border-color: var(--red); background: rgba(248,113,113,.1); }
  .opt.wrong .label { color: var(--red); }
  .opt.reveal { border-color: var(--green); background: rgba(52,211,153,.07); }
  .opt.reveal .label { color: var(--green); }
  .opt:disabled { cursor: default; }

  /* 멀티 확인 버튼 */
  .multi-submit {
    margin-top: 12px;
    padding: 10px 24px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: opacity .15s;
  }
  .multi-submit:hover { opacity: .85; }
  .multi-submit:disabled { opacity: .4; cursor: default; }

  /* 해설 */
  .explanation {
    margin-top: 16px;
    padding: 14px 16px;
    background: var(--surface2);
    border-radius: 10px;
    border-left: 3px solid var(--green);
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    display: none;
  }
  .explanation.wrong-exp { border-left-color: var(--red); }
  .explanation.show { display: block; }
  .explanation strong { color: var(--text); }

  /* 네비게이션 */
  .nav {
    width: 100%;
    max-width: 720px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 4px;
  }
  .nav-btn {
    padding: 9px 22px;
    border: 1px solid var(--border);
    border-radius: 9px;
    background: transparent;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color .15s, background .15s;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(108,140,255,.08); }
  .nav-btn:disabled { opacity: .3; cursor: default; }

  /* 결과 화면 */
  .result-screen {
    width: 100%;
    max-width: 720px;
    display: none;
  }
  .result-top {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 28px;
    text-align: center;
    margin-bottom: 16px;
  }
  .result-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 64px;
    font-weight: 700;
    color: var(--green);
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-pct.fail { color: var(--red); }
  .result-verdict {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .result-stats {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .stat-box {
    background: var(--surface2);
    border-radius: 10px;
    padding: 14px 24px;
    text-align: center;
    min-width: 100px;
  }
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .stat-num.ok { color: var(--green); }
  .stat-num.ng { color: var(--red); }
  .stat-num.tot { color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--muted); }

  .result-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .result-btn {
    padding: 10px 24px;
    border-radius: 9px;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    transition: opacity .15s;
    border: none;
  }
  .result-btn.primary { background: var(--accent); color: #fff; }
  .result-btn.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .result-btn:hover { opacity: .85; }

  .wrong-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .wrong-title {
    padding: 16px 20px;
    font-size: 14px;
    font-weight: 700;
    color: var(--red);
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: .04em;
  }
  .wrong-item {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .15s;
  }
  .wrong-item:last-child { border-bottom: none; }
  .wrong-item:hover { background: var(--surface2); }
  .wrong-item-q { font-size: 13px; color: var(--text); margin-bottom: 8px; line-height: 1.5; }
  .wrong-item-meta { display: flex; gap: 12px; flex-wrap: wrap; }
  .wrong-item-ans { font-size: 12px; font-family: 'JetBrains Mono', monospace; }
  .wrong-item-ans.my { color: var(--red); }
  .wrong-item-ans.correct { color: var(--green); }
  .wrong-item-exp { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.6; }

  /* 탭 */
  .tabs {
    width: 100%;
    max-width: 720px;
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
  }
  .tab-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all .15s;
  }
  .tab-btn.active { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  /* 문제 목록 탭 */
  .list-wrap {
    width: 100%;
    max-width: 720px;
    display: none;
  }
  .list-filters {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .list-filter-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all .15s;
  }
  .list-filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(108,140,255,.1); }
  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .list-item:hover { border-color: var(--accent); background: rgba(108,140,255,.04); }
  .list-item.ok { border-left: 3px solid var(--green); }
  .list-item.ng { border-left: 3px solid var(--red); }
  .list-item-top { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
  .list-item-q { font-size: 13px; color: var(--text); line-height: 1.5; }
</style>
</head>
<body>

<header>
  <span class="header-title">ISTQB · CTFL 4.0 · SAMPLE B</span>
  <div class="score-area">
    <span class="score-ok" id="scoreOk">✓ 0</span>
    <span class="score-ng" id="scoreNg">✗ 0</span>
    <span class="score-tot" id="scoreTot">/ 40</span>
  </div>
</header>

<div class="dots-wrap" id="dotsWrap"></div>

<!-- 탭 -->
<div class="tabs" id="tabsEl">
  <button class="tab-btn active" onclick="switchTab('quiz')">📝 문제 풀기</button>
  <button class="tab-btn" onclick="switchTab('list')">📋 문제 목록</button>
  <button class="tab-btn" onclick="switchTab('result')">📊 결과</button>
</div>

<!-- 퀴즈 영역 -->
<div id="quizArea" style="width:100%;max-width:720px;">
  <div class="card" id="qCard">
    <div class="q-meta" id="qMeta"></div>
    <div class="q-text" id="qText"></div>
    <div class="q-sub" id="qSub" style="display:none"></div>
    <div class="multi-badge" id="multiBadge" style="display:none">복수 선택 — 해당하는 것을 모두 선택하세요</div>
    <div class="options" id="optionsEl"></div>
    <button class="multi-submit" id="multiSubmit" style="display:none" onclick="submitMulti()">선택 완료</button>
    <div class="explanation" id="expEl"></div>
  </div>
  <div class="nav">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← 이전</button>
    <span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted)" id="navCounter">1 / 40</span>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">다음 →</button>
  </div>
</div>

<!-- 문제 목록 -->
<div class="list-wrap" id="listArea">
  <div class="list-filters">
    <button class="list-filter-btn active" onclick="setListFilter('all',this)">전체</button>
    <button class="list-filter-btn" onclick="setListFilter('unanswered',this)">미응답</button>
    <button class="list-filter-btn" onclick="setListFilter('ok',this)">정답</button>
    <button class="list-filter-btn" onclick="setListFilter('ng',this)">오답</button>
  </div>
  <div id="listItems"></div>
</div>

<!-- 결과 -->
<div class="result-screen" id="resultScreen">
  <div class="result-top">
    <div class="result-pct" id="resPct">0%</div>
    <div class="result-verdict" id="resVerdict">아직 풀지 않았어요</div>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-num ok" id="resOk">0</div><div class="stat-label">정답</div></div>
      <div class="stat-box"><div class="stat-num ng" id="resNg">0</div><div class="stat-label">오답</div></div>
      <div class="stat-box"><div class="stat-num tot" id="resTotal">0</div><div class="stat-label">응답</div></div>
    </div>
    <div class="result-actions">
      <button class="result-btn primary" onclick="retryAll()">처음부터 다시</button>
      <button class="result-btn secondary" onclick="retryWrong()">오답만 다시 풀기</button>
    </div>
  </div>
  <div class="wrong-section" id="wrongSection">
    <div class="wrong-title" id="wrongTitle">오답 목록</div>
    <div id="wrongList"></div>
  </div>
</div>

<script>
const QUESTIONS = [
  {id:1,lo:'FL-1.2.1',k:'K2',multi:false,
   q:'다음 중 테스팅이 필요한 이유인 것은?',
   sub:'',
   opts:['동적 테스팅에서는 사용자가 절대 할 수 없는 방법으로 테스트 대상에 문제를 발생시켜 품질을 향상시킨다','정적 테스팅은 개발자가 동적 테스팅보다 더 빠른 시점에 작성한 코드에서 장애를 식별하기 위해 사용한다','정적 분석은 출력이 없는 시스템 컴포넌트가 배포 준비 완료 상태라는 증거를 고객에게 제공한다','리뷰를 통해 요구사항 명세서의 품질이 높아짐에 따라 도출되는 작업 산출물의 변경 필요성이 줄어들게 된다'],
   ans:[3],
   exp:'<strong>정답: d)</strong> 리뷰는 소프트웨어 개발 수명주기 초기부터 적용할 수 있는 정적 테스팅으로 이후 개발 활동에서 잘못된 요구사항으로 인해 낭비되는 노력을 막기 위해 결함을 찾는 데 사용됩니다. 결함을 조기에 발견하고 제거하지 않으면 요구사항을 변경해야 할 수 있습니다.'},

  {id:2,lo:'FL-1.2.2',k:'K1',multi:false,
   q:'다음 중 품질 보증(QA) 및 품질 제어(QC)에 대한 설명으로 올바른 것은?',
   sub:'',
   opts:['품질 보증은 테스팅의 일부로 수행된다','구문 테스팅은 품질 제어의 일부로 수행된다','테스팅과 품질 제어는 같은 의미이다','테스팅은 품질 보증의 일부로 수행된다'],
   ans:[1],
   exp:'<strong>정답: b)</strong> QC는 제품 결함을 식별하고 수정하는 데 중점을 두어 적절한 품질 수준을 달성하는 것을 목표로 합니다. 테스팅은 QC의 중요한 부분이며 결함을 발견하는 데 도움이 됩니다.'},

  {id:3,lo:'FL-1.3.1',k:'K2',multi:false,
   q:"'테스팅 원리' 중 하나는 완벽한 테스팅은 불가능하다는 것이다. 다음 중 이 원리에 대처할 수 있는 방법은?",
   sub:'',
   opts:['명시된 모든 가능한 출력값을 커버하는 테스트 케이스 작성','가능한 모든 테스트 입력값을 문서화하고 중요도에 따라 우선순위 지정','리뷰 및 다른 정적 테스팅 접근법을 통해 가능한 한 빨리 테스팅 시작','동등 분할과 경계값 분석을 사용해 테스트 케이스 작성'],
   ans:[3],
   exp:'<strong>정답: d)</strong> 테스트 케이스를 도출하기 위해 동등 분할과 경계값 분석을 사용하는 것은 모든 가능한 테스트 케이스에서 유한한 부분 집합을 체계적으로 도출하는 방법을 제공하기 때문에 이 원리에 대응하는 방법입니다.'},

  {id:4,lo:'FL-1.4.1',k:'K2',multi:false,
   q:'다음 중 테스트 데이터 요구사항, 테스트 컨디션, 테스트 환경 요구사항, 테스트 케이스를 작성하는 테스트 활동은?',
   sub:'',
   opts:['테스트 설계','테스트 실행','테스트 분석','테스트 구현'],
   ans:[0],
   exp:'<strong>정답: a)</strong> 테스트 설계는 테스트 컨디션을 사용해 테스트 케이스와 기타 필요한 테스트웨어(예: 테스트 데이터 요구사항, 테스트 환경 요구사항)를 만드는 것을 포함합니다.'},

  {id:5,lo:'FL-1.4.2',k:'K2',multi:false,
   q:'다음 중 주어진 테스트 대상에 대한 테스트를 수행하는 방식에 영향을 줄 가능성이 가장 큰 것은?',
   sub:'',

   q:'도구 설명(1.작업흐름 추적 지원 / 2.의사소통 촉진 / 3.가상 머신 / 4.리뷰 지원)과 도구 분류(A.정적 테스팅 도구 / B.확장성 및 배포 표준화 지원 도구 / C.데브옵스 도구 / D.협업 도구)를 가장 적절하게 연결한 것은?',
   sub:'',
   opts:['1A, 2B, 3C, 4D','1B, 2D, 3C, 4A','1C, 2D, 3B, 4A','1D, 2C, 3A, 4B'],
   ans:[2],
   exp:'<strong>정답: c)</strong> 1-C: 작업흐름 추적은 데브옵스 도구 / 2-D: 의사소통 촉진은 협업 도구 / 3-B: 가상 머신은 확장성 및 배포 표준화 지원 도구 / 4-A: 리뷰 지원은 정적 테스팅 도구'},

  {id:40,lo:'FL-6.2.1',k:'K1',multi:false,
   q:'다음 중 테스트 자동화의 이점으로 가장 적절한 것은?',
   sub:'',
   opts:['사람이 도출하기에는 너무 복잡한 커버리지 측정치를 제공해준다','테스팅에 대한 책임을 도구 공급업체와 공유하게 한다','테스트 결과 분석 시 비판적 사고를 하지 않아도 되게 한다','프로그램 코드를 분석해서 테스트 케이스를 작성한다'],
   ans:[0],
   exp:'<strong>정답: a)</strong> 테스트 자동화는 사람이 도출하기에는 너무 복잡한 측정치(예: 아주 간단한 코드를 제외한 대부분의 코드에 대한 화이트박스 테스팅 커버리지)를 제공할 수 있습니다.'}
];

// ── 상태 ──
let answers = {};
let currentIdx = 0;
let multiSelected = [];
let currentListFilter = 'all';
let currentTab = 'quiz';
let queue = [];

function arrEq(a, b) {
  if (a.length !== b.length) return false;
  const sa = [...a].sort(), sb = [...b].sort();
  return sa.every((v, i) => v === sb[i]);
}
function isMulti(q) { return q.multi; }

// ── 초기화 ──
function init(qs) {
  queue = qs || [...Array(QUESTIONS.length).keys()];
  answers = {};
  currentIdx = 0;
  multiSelected = [];
  buildDots();
  renderQ(0);
  updateScore();
}

function buildDots() {
  const wrap = document.getElementById('dotsWrap');
  wrap.innerHTML = '';
  queue.forEach((qi, i) => {
    const q = QUESTIONS[qi];
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' current' : '');
    dot.textContent = q.id;
    dot.onclick = () => { navigate(i - currentIdx); };
    dot.id = 'dot-' + i;
    wrap.appendChild(dot);
  });
}

function updateDots() {
  queue.forEach((qi, i) => {
    const dot = document.getElementById('dot-' + i);
    if (!dot) return;
    const ans = answers[i];
    let cls = 'dot';
    if (i === currentIdx) cls += ' current';
    if (ans !== undefined) {
      const q = QUESTIONS[qi];
      const ok = isMulti(q) ? arrEq(Array.isArray(ans)?ans:[ans], q.ans) : ans === q.ans;
      cls += ok ? ' answered-ok' : ' answered-ng';
    }
    dot.className = cls;
  });
}

// ── 렌더 ──
function renderQ(idx) {
  currentIdx = idx;
  multiSelected = [];
  const qi = queue[idx];
  const q = QUESTIONS[qi];
  const labels = ['a','b','c','d','e'];

  document.getElementById('qMeta').innerHTML =
    `<span class="q-id">Q${q.id}</span><span class="q-lo">${q.lo}</span><span class="q-k">${q.k}</span>`;
  document.getElementById('qText').textContent = q.q;

  const subEl = document.getElementById('qSub');
  if (q.sub) { subEl.textContent = q.sub; subEl.style.display = 'block'; }
  else subEl.style.display = 'none';

  const mb = document.getElementById('multiBadge');
  mb.style.display = isMulti(q) ? 'inline-block' : 'none';

  const optsEl = document.getElementById('optionsEl');
  optsEl.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="label">${labels[i]})</span><span>${opt}</span>`;

    const answered = answers[idx] !== undefined;
    if (answered) {
      btn.disabled = true;
      const userAns = answers[idx];
      const userArr = Array.isArray(userAns) ? userAns : [userAns];
      const correctArr = q.ans;
      if (isMulti(q)) {
        if (correctArr.includes(i)) btn.classList.add(userArr.includes(i) ? 'correct' : 'reveal');
        else if (userArr.includes(i)) btn.classList.add('wrong');
      } else {
        if (i === q.ans[0]) btn.classList.add('correct');
        else if (i === userAns) btn.classList.add('wrong');
      }
    } else {
      if (isMulti(q)) {
        btn.onclick = () => toggleMulti(i, btn);
      } else {
        btn.onclick = () => answerSingle(idx, i);
      }
    }
    optsEl.appendChild(btn);
  });

  const ms = document.getElementById('multiSubmit');
  if (isMulti(q) && answers[idx] === undefined) {
    ms.style.display = 'inline-block';
    ms.disabled = true;
  } else {
    ms.style.display = 'none';
  }

  const expEl = document.getElementById('expEl');
  if (answers[idx] !== undefined) {
    const userAns = answers[idx];
    const userArr = Array.isArray(userAns) ? userAns : [userAns];
    const ok = isMulti(q) ? arrEq(userArr, q.ans) : userAns === q.ans[0];
    expEl.innerHTML = q.exp;
    expEl.className = 'explanation show' + (ok ? '' : ' wrong-exp');
  } else {
    expEl.className = 'explanation';
  }

  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === queue.length - 1;
  document.getElementById('navCounter').textContent = `${idx + 1} / ${queue.length}`;

  updateDots();
}

function toggleMulti(i, btn) {
  const idx = multiSelected.indexOf(i);
  if (idx === -1) { multiSelected.push(i); btn.classList.add('selected'); }
  else { multiSelected.splice(idx, 1); btn.classList.remove('selected'); }
  document.getElementById('multiSubmit').disabled = multiSelected.length === 0;
}

function submitMulti() {
  const qi = queue[currentIdx];
  const q = QUESTIONS[qi];
  const sel = [...multiSelected].sort();
  answers[currentIdx] = sel;
  renderQ(currentIdx);
  updateScore();
  updateResult();
}

function answerSingle(idx, choice) {
  answers[idx] = choice;
  renderQ(idx);
  updateScore();
  updateResult();
}

function navigate(delta) {
  const next = currentIdx + delta;
  if (next < 0 || next >= queue.length) return;
  renderQ(next);
}

function updateScore() {
  let ok = 0, ng = 0;
  Object.entries(answers).forEach(([i, ans]) => {
    const qi = queue[parseInt(i)];
    const q = QUESTIONS[qi];
    const arr = Array.isArray(ans) ? ans : [ans];
    const correct = isMulti(q) ? arrEq(arr, q.ans) : ans === q.ans[0];
    if (correct) ok++; else ng++;
  });
  document.getElementById('scoreOk').textContent = '✓ ' + ok;
  document.getElementById('scoreNg').textContent = '✗ ' + ng;
  document.getElementById('scoreTot').textContent = '/ ' + queue.length;
}

// ── 탭 ──
function switchTab(tab) {
  currentTab = tab;
  const tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach((t, i) => t.classList.toggle('active', ['quiz','list','result'][i] === tab));
  document.getElementById('quizArea').style.display = tab === 'quiz' ? 'block' : 'none';
  document.getElementById('listArea').style.display = tab === 'list' ? 'block' : 'none';
  document.getElementById('resultScreen').style.display = tab === 'result' ? 'block' : 'none';
  if (tab === 'list') renderList();
  if (tab === 'result') updateResult();
}

// ── 문제 목록 ──
function setListFilter(f, btn) {
  currentListFilter = f;
  document.querySelectorAll('.list-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const labels = ['a','b','c','d','e'];
  const wrap = document.getElementById('listItems');
  wrap.innerHTML = '';
  queue.forEach((qi, i) => {
    const q = QUESTIONS[qi];
    const ans = answers[i];
    const answered = ans !== undefined;
    let ok = false;
    if (answered) {
      const arr = Array.isArray(ans) ? ans : [ans];
      ok = isMulti(q) ? arrEq(arr, q.ans) : ans === q.ans[0];
    }
    if (currentListFilter === 'unanswered' && answered) return;
    if (currentListFilter === 'ok' && (!answered || !ok)) return;
    if (currentListFilter === 'ng' && (!answered || ok)) return;

    const div = document.createElement('div');
    div.className = 'list-item' + (answered ? (ok ? ' ok' : ' ng') : '');
    div.onclick = () => { switchTab('quiz'); navigate(i - currentIdx); };
    div.innerHTML = `
      <div class="list-item-top">
        <span class="q-id">Q${q.id}</span>
        <span class="q-lo">${q.lo}</span>
        <span class="q-k">${q.k}</span>
        ${answered ? `<span style="font-size:12px;color:${ok?'var(--green)':'var(--red)'}">${ok?'✓ 정답':'✗ 오답'}</span>` : '<span style="font-size:12px;color:var(--muted)">미응답</span>'}
      </div>
      <div class="list-item-q">${q.q.length > 80 ? q.q.slice(0,80)+'...' : q.q}</div>
    `;
    wrap.appendChild(div);
  });
  if (!wrap.children.length) {
    wrap.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;font-size:14px">해당 항목이 없습니다</div>';
  }
}

// ── 결과 ──
function updateResult() {
  let ok = 0, ng = 0;
  Object.entries(answers).forEach(([i, ans]) => {
    const qi = queue[parseInt(i)];
    const q = QUESTIONS[qi];
    const arr = Array.isArray(ans) ? ans : [ans];
    const correct = isMulti(q) ? arrEq(arr, q.ans) : ans === q.ans[0];
    if (correct) ok++; else ng++;
  });
  const total = Object.keys(answers).length;
  const pct = total === 0 ? 0 : Math.round(ok / queue.length * 100);
  const pctEl = document.getElementById('resPct');
  pctEl.textContent = pct + '%';
  pctEl.className = 'result-pct' + (pct >= 65 ? '' : ' fail');
  document.getElementById('resVerdict').textContent = total === 0 ? '아직 풀지 않았어요' : pct >= 65 ? '🎉 합격권 달성! (65% 이상)' : `조금 더 분발해요 — ${65 - pct}% 부족`;
  document.getElementById('resOk').textContent = ok;
  document.getElementById('resNg').textContent = ng;
  document.getElementById('resTotal').textContent = total;

  const labels = ['a','b','c','d','e'];
  const wrongList = document.getElementById('wrongList');
  wrongList.innerHTML = '';
  let hasWrong = false;
  Object.entries(answers).forEach(([i, ans]) => {
    const qi = queue[parseInt(i)];
    const q = QUESTIONS[qi];
    const arr = Array.isArray(ans) ? ans : [ans];
    const correct = isMulti(q) ? arrEq(arr, q.ans) : ans === q.ans[0];
    if (correct) return;
    hasWrong = true;
    const myAns = arr.map(x => labels[x]).join(', ');
    const corrAns = q.ans.map(x => labels[x]).join(', ');
    const div = document.createElement('div');
    div.className = 'wrong-item';
    div.onclick = () => { switchTab('quiz'); navigate(parseInt(i) - currentIdx); };
    div.innerHTML = `
      <div style="font-size:11px;color:var(--accent);font-family:'JetBrains Mono',monospace;margin-bottom:6px">Q${q.id} · ${q.lo}</div>
      <div class="wrong-item-q">${q.q.length > 100 ? q.q.slice(0,100)+'...' : q.q}</div>
      <div class="wrong-item-meta">
        <span class="wrong-item-ans my">내 답: ${myAns}</span>
        <span class="wrong-item-ans correct">정답: ${corrAns}</span>
      </div>
      <div class="wrong-item-exp">${q.exp.replace(/<[^>]*>/g, '')}</div>
    `;
    wrongList.appendChild(div);
  });
  if (!hasWrong && total > 0) {
    wrongList.innerHTML = '<div style="text-align:center;color:var(--green);padding:20px;font-size:14px">🎉 오답이 없습니다!</div>';
  } else if (total === 0) {
    wrongList.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;font-size:14px">문제를 풀면 여기에 결과가 표시됩니다</div>';
  }
  document.getElementById('wrongTitle').textContent = hasWrong ? `오답 목록 (${ng}문제)` : '오답 목록';
}

function retryAll() {
  init([...Array(QUESTIONS.length).keys()]);
  switchTab('quiz');
}

function retryWrong() {
  const wrongIdxs = [];
  Object.entries(answers).forEach(([i, ans]) => {
    const qi = queue[parseInt(i)];
    const q = QUESTIONS[qi];
    const arr = Array.isArray(ans) ? ans : [ans];
    const correct = isMulti(q) ? arrEq(arr, q.ans) : ans === q.ans[0];
    if (!correct) wrongIdxs.push(qi);
  });
  if (wrongIdxs.length === 0) return;
  init(wrongIdxs);
  switchTab('quiz');
}

// 시작
init();
</script>
